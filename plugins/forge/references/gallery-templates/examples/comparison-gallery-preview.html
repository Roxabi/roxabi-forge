<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: diagram-meta — update title, date, color, badges
     ═══════════════════════════════════════════════════════════════ -->
<title>Forge · Comparison Gallery</title>
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="Forge · Comparison Gallery">
<meta name="diagram:date"      content="2026-07-04">
<meta name="diagram:category"  content="gallery">
<meta name="diagram:cat-label" content="Gallery">
<meta name="diagram:color"     content="#f0b429">
<meta name="diagram:badges"    content="latest">
<!-- diagram-meta:end -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* gallery-base — baked */
/* ══════════════════════════════════════════════════════════════════
   gallery-base.css — shared foundation for all forge gallery templates
   v0.2.0 — brand-aligned default (Roxabi hub palette)

   Default tokens below match the Roxabi brand book (bg #0d1117,
   accent #f0b429 amber, text #f0ede6 warm off-white, Inter).
   Project galleries (Lyra #e85d04, etc.) should OVERRIDE
   --accent / --accent-dim / --font in the consuming page's <style>.

   Brand SSoT: ~/.roxabi/forge/roxabi-site/brand/BRAND-BOOK.md §6
   Drift check: scripts/check-brand-drift.sh (lefthook pre-commit)
   ══════════════════════════════════════════════════════════════════ */

/* ── Tokens ── */
:root {
  --bg:#0d1117; --surface:#13191f; --surface2:#161b22; --card:#1e2133;
  --border:rgba(255,255,255,0.07); --border2:#30363d;
  --text:#f0ede6; --text-dim:#9ca3af; --text-xdim:#6b7280;
  /* CUSTOMISE: swap accent for your project brand (Lyra=#e85d04, etc.) */
  --accent:#f0b429;
  --accent-dim:rgba(240,180,41,0.12);
  --green:#34d399; --green-dim:rgba(52,211,153,0.12);
  --blue:#60a5fa;  --blue-dim:rgba(96,165,250,0.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,0.12);
  --cyan:#22d3ee;  --cyan-dim:rgba(34,211,238,0.12);
  --amber:#f0b429; --amber-dim:rgba(240,180,41,0.12);
  --red:#f87171;   --red-dim:rgba(248,113,113,0.12);
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
[data-theme="light"] {
  --bg:#f5f2ec; --surface:#ede9e0; --surface2:#e5e0d5; --card:#faf8f4;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1d2b; --text-dim:#5a6070; --text-xdim:#9aa0ae;
  --green:#047857; --green-dim:rgba(4,120,87,0.1);
  --blue:#1d4ed8;  --blue-dim:rgba(29,78,216,0.1);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,0.1);
  --orange:#ea580c;--orange-dim:rgba(234,88,12,0.1);
  --cyan:#0891b2;  --cyan-dim:rgba(8,145,178,0.1);
  --amber:#b8760a; --amber-dim:rgba(184,118,10,0.1);
  --red:#dc2626;   --red-dim:rgba(220,38,38,0.1);
}

/* ── Base resets ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}

/* ── Header ── */
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.header-left h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.01em}
.header-left h1 span{color:var(--accent)}
.header-left .sub{font-size:.72rem;color:var(--text-dim);margin-top:3px;line-height:1.4}
.theme-btn{background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);cursor:pointer;font-size:.85rem;padding:5px 10px;flex-shrink:0}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Toolbar ── */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.toolbar:last-of-type{margin-bottom:12px}
.ctrl{display:flex;align-items:center;gap:4px}
.ctrl-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-xdim);font-family:var(--mono)}

/* ── Segmented controls ── */
.segs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.seg{background:none;border:none;border-right:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:var(--font);font-size:.65rem;font-weight:500;padding:4px 8px;transition:background .1s,color .1s;white-space:nowrap}
.seg:last-child{border-right:none}
.seg:hover{background:var(--surface2);color:var(--text)}
.seg.on{background:var(--accent-dim);color:var(--accent);font-weight:600}

/* ── Checkbox toggle buttons (OFF = inactive = show all) ── */
.check-group{display:flex;gap:3px;flex-wrap:wrap}
.check-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.6rem;padding:3px 6px;font-family:var(--mono);transition:all .1s}
.check-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.check-btn:hover{border-color:var(--accent)}

/* ── Size +/− ── */
.size-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.85rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:var(--mono)}
.size-btn:hover{border-color:var(--accent);color:var(--accent)}
.size-label{font-size:.6rem;color:var(--text-xdim);font-family:var(--mono);min-width:24px;text-align:center}

/* ── Inputs ── */
.filter-input{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.65rem;padding:4px 8px;outline:none}
.filter-input:focus{border-color:var(--accent)}
.search-input{width:140px}

/* ── Stats ── */
.stats{font-family:var(--mono);font-size:.6rem;color:var(--text-xdim);margin-left:auto}

/* ── Group headers ── */
.group-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding:4px 0;border-top:1px solid var(--border)}
.group-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:4px;font-family:var(--mono);background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.group-cnt{font-family:var(--mono);font-size:.58rem;color:var(--text-xdim)}

/* ── Empty state ── */
.empty{text-align:center;padding:64px 24px;color:var(--text-xdim);font-size:.84rem}

/* ── Pixel-art rendering utility ──
   Apply to <img> in sprite galleries (32×32, 64×64, etc.) to disable
   browser smoothing and preserve crisp pixel edges at any scale.
   Declaration order matters: last supported value wins. `pixelated` goes
   last so modern browsers (Chromium/Firefox/Safari all support it natively
   as of 2021+) use nearest-neighbour scaling rather than `crisp-edges`
   (which is W3C-defined as edge-preserving, potentially with smoothing). */
.pixelated{image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;image-rendering:pixelated}

/* ── Downloads dropdown ──
   Wire via initDownloads({dropdownId, toggleId, menuId, entries}). */
.dl-wrap{position:relative;display:inline-block}
.dl-toggle{background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);cursor:pointer;font-size:.72rem;padding:5px 10px;font-family:var(--mono);display:flex;align-items:center;gap:4px}
.dl-toggle:hover{border-color:var(--accent);color:var(--accent)}
.dl-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:6px 0;min-width:240px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.dl-menu.open{display:block}
.dl-item{display:block;width:100%;background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:var(--mono);font-size:.6rem;padding:7px 14px;text-align:left;transition:all .1s}
.dl-item:hover{background:var(--accent-dim);color:var(--accent)}
.dl-item[data-loading="true"]{opacity:.5;cursor:wait;pointer-events:none}
.dl-item[data-loading="true"]::after{content:" ⏳"}
.dl-hint{display:block;font-size:.48rem;color:var(--text-xdim);margin-top:1px}
.dl-item:hover .dl-hint{color:var(--accent)}

/* ── Toast stack ──
   Populated by showToast(message, variant, duration). */
.toast-stack{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:.65rem;color:var(--text);max-width:340px;box-shadow:0 4px 16px rgba(0,0,0,.35);pointer-events:auto;animation:toast-in .2s ease-out}
.toast-info{border-color:var(--blue);color:var(--blue)}
.toast-error{border-color:var(--red);color:var(--red)}
.toast-leaving{opacity:0;transform:translateX(8px);transition:all .2s ease-in}
@keyframes toast-in{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}

/* ── Responsive ── */
@media(max-width:860px){.ctrl-label{display:none}}
@media(max-width:600px){.toolbar{gap:4px}.seg{font-size:.58rem;padding:3px 5px}.search-input{width:100px}.dl-menu{min-width:200px}}


/* ══════════════════════════════════════════════════════════════════
   CUSTOMISE: override accent tokens for your project brand
   ══════════════════════════════════════════════════════════════════ */
:root {
  --accent:#f0b429;   /* e.g. #e8a030 */
  --accent-dim:rgba(240,180,41,0.12); /* e.g. rgba(232,160,48,0.12) */
}

/* ── Layout ── */
.layout{max-width:1400px;margin:0 auto;padding:24px 24px 64px}

/* ── Header overrides ── */
.header{padding-bottom:20px;margin-bottom:18px}
.header-left h1{font-size:1.4rem;letter-spacing:-0.02em}
.header-left .sub{font-size:.78rem;margin-top:4px;line-height:1.5}

/* ── Toolbar overrides ── */
.toolbar{padding:8px 0}
.toolbar:last-of-type{margin-bottom:16px}
.seg{padding:4px 9px}
.size-label{min-width:28px}
.search-input{width:160px}

/* ── Section headers ── */
.section-hdr{margin:28px 0 14px;padding-top:20px;border-top:1px solid var(--border)}
.section-hdr h2{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:4px}
.section-hdr .section-sub{font-size:.75rem;color:var(--text-dim);line-height:1.5}
.section-hdr:first-child{margin-top:0;padding-top:0;border-top:none}

/* ── Card grid ── */
.card-grid{display:grid;gap:16px}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.comp-card:hover{border-color:var(--border2)}
.comp-card.hidden{display:none}

/* Card image */
.comp-card .card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:zoom-in;background:var(--surface)}

/* Card body */
.comp-card .card-body{padding:14px 16px}
.comp-card .card-title{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}

/* Badges */
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.04em;border:1px solid}
/* CUSTOMISE: add badge variants matching your data — or reuse these built-ins */
.bdg-clean  {background:var(--green-dim); color:var(--green); border-color:var(--green)}
.bdg-bad    {background:var(--red-dim);   color:var(--red);   border-color:var(--red)}
.bdg-mid    {background:var(--amber-dim); color:var(--amber); border-color:var(--amber)}
.bdg-ref    {background:var(--blue-dim);  color:var(--blue);  border-color:var(--blue)}
.bdg-a      {background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.bdg-b      {background:var(--purple-dim);color:var(--purple);border-color:var(--purple)}
.bdg-c      {background:var(--orange-dim);color:var(--orange);border-color:var(--orange)}

/* Specs table */
.specs-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.76rem}
.specs-table td{padding:3px 0;vertical-align:top}
.specs-table td:first-child{color:var(--text-xdim);width:110px;white-space:nowrap;padding-right:10px}
.specs-table td:last-child{color:var(--text-dim)}
.specs-table td code{font-family:var(--mono);font-size:.7rem;background:var(--surface);padding:1px 4px;border-radius:3px}

/* Verdict */
.verdict{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:.78rem;line-height:1.5}
.verdict-clean{background:var(--green-dim);border:1px solid rgba(52,211,153,.25);color:#6ee7b7}
.verdict-bad  {background:var(--red-dim);  border:1px solid rgba(248,113,113,.25);color:#fca5a5}
.verdict-mid  {background:var(--amber-dim);border:1px solid rgba(232,160,48,.25); color:#fcd34d}
/* CUSTOMISE: add more verdict types if needed */

/* ── Lightbox ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;justify-content:center;align-items:center;cursor:zoom-out}
.lb.active{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain}
.lb-label{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:var(--text-dim);font-family:var(--mono);font-size:.7rem;white-space:nowrap}
.lb-close{position:absolute;top:16px;right:20px;font-size:20px;color:var(--text-xdim);cursor:pointer;transition:color .15s}
.lb-close:hover{color:var(--text)}

</style>
</head>
<body>
<div class="layout">

<!-- ═══════════════════════════════════════════════════════════════
     CUSTOMISE: header — update title, subtitle
     ═══════════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-left">
    <h1>Forge <span>Comparison Gallery</span></h1>
    <div class="sub">Baked gallery template preview</div>
  </div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">&#127769;</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 1: sort + size
     CUSTOMISE: sort options should match meaningful card fields
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar">
  <div class="ctrl"><span class="ctrl-label">Sort</span>
    <div class="segs" id="sortSegs">
      <button class="seg on" data-v="default">Default</button>
      <button class="seg" data-v="title">Title A–Z</button>
      <!-- CUSTOMISE: add sort modes matching card fields, e.g. data-v="verdict" -->
    </div>
  </div>
  <div class="ctrl"><span class="ctrl-label">Size</span>
    <button class="size-btn" onclick="resizeCards(-40)">&#8722;</button>
    <span class="size-label" id="sizeLabel">380</span>
    <button class="size-btn" onclick="resizeCards(+40)">+</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOOLBAR ROW 2: dynamic filters + search
     Filters auto-built from FILTERS_DIMS — no hardcoded buttons
     ═══════════════════════════════════════════════════════════════ -->
<div class="toolbar" id="filterBar">
  <div class="ctrl"><span class="ctrl-label">Search</span>
    <input class="filter-input search-input" id="searchInput" type="text" placeholder="filter..." oninput="render()">
  </div>
</div>

<!-- Sections + cards rendered here -->
<div id="gallery"></div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLbOutside(event)">
  <span class="lb-close" onclick="closeLb()">&#10005;</span>
  <img id="lbImg" src="" alt="">
  <div class="lb-label" id="lbLabel"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   gallery-base.js — shared utilities for forge gallery templates
   v0.4.0

   Provides: theme toggle, dynamic filter builder, filter application,
   segmented control wiring, file discovery.

   Each template adds its own <script> block for rendering, lightbox,
   starring, boot logic, etc.
   ══════════════════════════════════════════════════════════════════ */

/* ── Theme ── */

/**
 * Initialize dark/light theme toggle with localStorage persistence.
 * Requires: element #themeBtn, html[data-theme].
 * @param {string} storeKey - localStorage prefix (e.g. 'lyra-avatar')
 * @returns {{ theme: string }} - mutable state object
 */
function initTheme(storeKey) {
  const stored = localStorage.getItem(`${storeKey}-theme`) || 'dark'
  const state = { theme: stored }

  function apply(t) {
    document.documentElement.setAttribute('data-theme', t)
    document.getElementById('themeBtn').textContent = t === 'dark' ? '\u{1F319}' : '\u2600\uFE0F'
    localStorage.setItem(`${storeKey}-theme`, t)
    state.theme = t
  }

  document.getElementById('themeBtn').addEventListener('click', () => {
    apply(state.theme === 'dark' ? 'light' : 'dark')
  })

  apply(stored)
  return state
}

/* ── Dynamic filter builder ── */

/**
 * Build check-btn filter buttons from data + dimension definitions.
 * Rule: all buttons OFF = inactive = show everything.
 *
 * @remarks
 * **Dual-API contract:** this function is type-agnostic about the items it receives.
 * `dim.fn` is called with each element of `items` verbatim — whether that's a filename
 * string (as in pivot-gallery.html) or a structured item object (as in comparison-gallery,
 * audio-gallery, and multi-mode-gallery). The caller picks the representation and
 * defines `dim.fn` accordingly. No runtime type inspection happens inside this function.
 *
 * Filename-string example:
 *     buildDimFilters(files, { batch: { label:'Batch', fn: f => f[0] } }, ...)
 *
 * Item-object example:
 *     buildDimFilters(items, { rarity: { label:'Rarity', fn: it => it.rarity } }, ...)
 *
 * See README §"Items-as-objects vs filename-strings" for when to pick each.
 *
 * @param {Array} items - Data array to scan. Elements can be strings, objects, or anything `dim.fn` accepts.
 * @param {Object} dims - { key: { label: string, fn: item => string, order?: string[] } }
 * @param {Object} filters - Mutable map: dim key → Set (empty = inactive). Populated by this function.
 * @param {string} barId - ID of the toolbar element to insert buttons into
 * @param {Function} renderFn - Called after any filter toggle
 */
function buildDimFilters(items, dims, filters, barId, renderFn) {
  const bar = document.getElementById(barId)

  for (const [key, dim] of Object.entries(dims)) {
    const counts = {}
    items.forEach((item) => {
      const v = dim.fn(item)
      counts[v] = (counts[v] || 0) + 1
    })
    const values = Object.keys(counts).sort((a, b) => {
      if (dim.order) {
        const ia = dim.order.indexOf(a),
          ib = dim.order.indexOf(b)
        if (ia >= 0 && ib >= 0) return ia - ib
        if (ia >= 0) return -1
        if (ib >= 0) return 1
      }
      return a.localeCompare(b)
    })

    if (values.length < 2) continue

    filters[key] = new Set()

    const ctrl = document.createElement('div')
    ctrl.className = 'ctrl'
    ctrl.innerHTML = `<span class="ctrl-label">${escHtml(dim.label)}</span>`
    const group = document.createElement('div')
    group.className = 'check-group'

    for (const v of values) {
      const btn = document.createElement('button')
      btn.className = 'check-btn'
      btn.dataset.b = v
      btn.textContent = `${v} (${counts[v]})`
      btn.onclick = () => {
        btn.classList.toggle('on')
        if (btn.classList.contains('on')) filters[key].add(v)
        else filters[key].delete(v)
        renderFn()
      }
      group.appendChild(btn)
    }
    ctrl.appendChild(group)
    bar.insertBefore(ctrl, bar.firstChild)
  }
}

/* ── Filter application ── */

/**
 * Apply active dimension filters to an array of items.
 *
 * @remarks
 * **Dual-API contract:** like {@link buildDimFilters}, this function is type-agnostic.
 * `dim.fn` receives whatever `items` contains — strings, objects, anything — and the
 * caller is responsible for defining `dim.fn` to match. No type inspection happens here.
 *
 * See {@link buildDimFilters} JSDoc for worked examples and the README subsection
 * "Items-as-objects vs filename-strings" for guidance on picking a representation.
 *
 * @param {Array} items - Items to filter (strings, objects, or anything `dim.fn` accepts)
 * @param {Object} dims - Dimension definitions with fn(item) → category
 * @param {Object} filters - Active filters: dim key → Set of selected values
 * @returns {Array} Filtered items (new array)
 */
function applyDimFilters(items, dims, filters) {
  let result = items
  for (const [dim, activeSet] of Object.entries(filters)) {
    if (activeSet.size === 0) continue
    const fn = dims[dim]?.fn
    if (fn) result = result.filter((item) => activeSet.has(fn(item)))
  }
  return result
}

/* ── Segmented controls ── */

/**
 * Wire a segmented control: click → toggle .on class, call handler.
 *
 * @param {string} containerId - ID of the .segs container
 * @param {Function} handler - Called with (value, button) on click
 */
function wireSegs(containerId, handler) {
  document.querySelectorAll(`#${containerId} .seg`).forEach((btn) => {
    btn.onclick = () => {
      // biome-ignore lint/suspicious/useIterableCallbackReturn: DOM forEach, no return needed
      document.querySelectorAll(`#${containerId} .seg`).forEach((b) => b.classList.remove('on'))
      btn.classList.add('on')
      handler(btn.dataset.v, btn)
    }
  })
}

/* ── File discovery ── */

/**
 * Resolve a gallery-relative directory path to its forge-root-relative form
 * for /api/list/ calls. Galleries nested under project subdirs (e.g.
 * lyra/brand/v23-gallery.html loading concepts/avatar-lyra-v23/) need the
 * full path from the forge root, not from the browser origin.
 *
 * Returns null if the resolved path fails same-origin or character checks.
 *
 * @param {string} dir - Directory path (relative or absolute from origin)
 * @returns {string|null} Forge-root-relative path (no leading slash), or null
 */
function resolveApiListPath(dir) {
  try {
    const resolved = new URL(dir, window.location.href)
    if (resolved.origin !== window.location.origin) return null
    const pathPart = resolved.pathname.replace(/^\//, '')
    // Same character allowlist as the pre-fix guard — applied to the resolved
    // path so '../' and './' in dir don't slip past validation.
    if (!/^[\w./-]+$/.test(pathPart)) return null
    return pathPart
  } catch (_) {
    return null
  }
}

/**
 * Discover files via img-manifest.json → /api/list/ fallback.
 * Returns array of filename strings.
 *
 * @param {string} dir - Directory path (relative to HTML)
 * @param {string} ext - File extension filter (e.g. '.png')
 * @returns {Promise<string[]>} Sorted filenames
 */
async function discoverFiles(dir, ext) {
  try {
    const r = await fetch(`${dir}img-manifest.json`)
    if (r.ok) {
      const listing = await r.json()
      return listing
        .filter((f) => f.name.endsWith(ext))
        .map((f) => f.name)
        .sort()
    }
  } catch (_) {}
  const apiPath = resolveApiListPath(dir)
  if (apiPath) {
    try {
      const r = await fetch(`/api/list/${apiPath}`)
      if (r.ok) {
        const listing = await r.json()
        return listing
          .filter((f) => f.name.endsWith(ext))
          .map((f) => f.name)
          .sort()
      }
    } catch (_) {}
  }
  return []
}

/**
 * Discover subdirectories of a parent directory via img-manifest.json → /api/list/ fallback.
 * Returns sorted array of subdirectory names (no trailing slash).
 *
 * Symmetric with {@link discoverFiles}: img-manifest.json is tried first for static /
 * file:// hosting (Cloudflare Pages), then /api/list/ for the forge dev server.
 * Manifest entries must include `is_dir:true` to be treated as directories.
 *
 * Use this for **two-level** galleries where the parent dir contains one subdir
 * per group (run, batch, LoRA, engine…) and each subdir contains the actual
 * image/audio files. The typical flow:
 *
 *     const DIR = 'concepts/avatar-lyra-v23/'
 *     const discovered = await discoverDirs(DIR)
 *     // → ['v23a-rank', 'v23c-dop', 'v23d-island0', 'v23d-island1', …]
 *     for (const run of discovered) {
 *       const files = await discoverFiles(DIR + run + '/', '.jpg')
 *       // …
 *     }
 *
 * See the "Dynamic subdirectory discovery" section in the gallery-templates
 * README for worked examples and the ordering-with-metadata pattern.
 *
 * **Static-hosting requirement:** on static hosts, the parent directory must
 * contain an img-manifest.json listing its subdirs as `is_dir:true` entries. The
 * forge `gen-image-manifests.py` build step generates these automatically.
 *
 * @param {string} dir - Parent directory path (relative to HTML)
 * @returns {Promise<string[]>} Sorted subdirectory names
 */
async function discoverDirs(dir) {
  try {
    const r = await fetch(`${dir}img-manifest.json`)
    if (r.ok) {
      const listing = await r.json()
      return listing
        .filter((e) => e.is_dir)
        .map((e) => e.name)
        .sort()
    }
  } catch (_) {}
  const apiPath = resolveApiListPath(dir)
  if (apiPath) {
    try {
      const r = await fetch(`/api/list/${apiPath}`)
      if (r.ok) {
        const listing = await r.json()
        return listing
          .filter((e) => e.is_dir)
          .map((e) => e.name)
          .sort()
      }
    } catch (_) {}
  }
  return []
}

/**
 * Discover batch of items with catalogue metadata.
 * Used by simple-gallery for multi-batch image galleries.
 *
 * @param {Object} cfg - { id, dir, ext?, catalogue? }
 * @param {Function} [itemBuilder] - Optional (stem, cfg) → item. Defaults to itemFromStem.
 * @returns {Promise<Array>} Array of item objects
 */
async function discoverBatch(cfg, itemBuilder) {
  const ext = cfg.ext || '.png'
  const build =
    itemBuilder ||
    ((stem, c) => {
      const meta = c.catalogue?.[stem] || { label: stem.replace(/-/g, ' '), tags: [] }
      return { stem, file: stem + ext, label: meta.label, tags: meta.tags || [], batch: c.id, dir: c.dir }
    })

  /* Try img-manifest.json */
  try {
    const r = await fetch(`${cfg.dir}img-manifest.json`)
    if (r.ok) {
      const listing = await r.json()
      return listing
        .filter((f) => f.name.endsWith(ext))
        .sort((a, b) => a.name.localeCompare(b.name))
        .map((f) => {
          const stem = f.name.replace(ext, '')
          /* Enriched manifest: entry carries label + tags — no catalogue lookup needed */
          if (f.label !== undefined || f.tags !== undefined)
            return { stem, file: f.name, label: f.label || stem, tags: f.tags || [], batch: c.id, dir: c.dir }
          return build(stem, cfg)
        })
    }
  } catch (_) {}
  /* Fallback: /api/list/ */
  const apiPath = resolveApiListPath(cfg.dir)
  if (apiPath) {
    try {
      const r = await fetch(`/api/list/${apiPath}`)
      if (r.ok) {
        const listing = await r.json()
        return listing
          .filter((f) => f.name.endsWith(ext))
          .map((f) => f.name.replace(ext, ''))
          .sort()
          .map((stem) => build(stem, cfg))
      }
    } catch (_) {}
  }
  /* Fallback: catalogue keys */
  if (cfg.catalogue && Object.keys(cfg.catalogue).length) {
    return Object.keys(cfg.catalogue).map((stem) => build(stem, cfg))
  }
  return []
}

/* ── Batch bar ── */

/**
 * Build batch tab buttons from item counts.
 *
 * @param {Object} opts
 * @param {string} opts.barId - ID of the batch bar element
 * @param {Array} opts.batches - BATCHES config array
 * @param {Object} opts.counts - { batchId: count }
 * @param {number} opts.total - Total item count
 * @param {Function} opts.onSelect - Called with (batchId) on click
 */
function buildBatchBar(opts) {
  const bar = document.getElementById(opts.barId)
  bar.innerHTML = ''

  const allBtn = document.createElement('button')
  allBtn.className = 'batch-btn active'
  allBtn.dataset.batch = 'all'
  allBtn.textContent = `ALL (${opts.total})`
  allBtn.onclick = () => selectBatch(bar, allBtn, 'all', opts.onSelect)
  bar.appendChild(allBtn)

  for (const b of opts.batches) {
    if (!(opts.counts[b.id] > 0)) continue
    const btn = document.createElement('button')
    btn.className = 'batch-btn'
    btn.dataset.batch = b.id
    btn.textContent = `${b.id.toUpperCase()} \u2014 ${b.label} (${opts.counts[b.id] || 0})`
    btn.onclick = () => selectBatch(bar, btn, b.id, opts.onSelect)
    bar.appendChild(btn)
  }
}

function selectBatch(bar, btn, id, callback) {
  // biome-ignore lint/suspicious/useIterableCallbackReturn: DOM forEach, no return needed
  bar.querySelectorAll('.batch-btn').forEach((b) => b.classList.remove('active'))
  btn.classList.add('active')
  callback(id)
}

/* ── Starring ── */

/**
 * Create a starring manager with localStorage persistence.
 *
 * @param {string} storeKey - localStorage prefix
 * @param {string} [suffix='-starred'] - localStorage key suffix
 * @returns {{ has, toggle, size, set: Set }}
 */
function initStarred(storeKey, suffix) {
  const key = storeKey + (suffix || '-starred')
  const set = new Set(JSON.parse(localStorage.getItem(key) || '[]'))

  function save() {
    localStorage.setItem(key, JSON.stringify([...set]))
  }

  return {
    set,
    has: (id) => set.has(id),
    toggle: (id) => {
      if (set.has(id)) set.delete(id)
      else set.add(id)
      save()
      return set.has(id)
    },
    get size() {
      return set.size
    },
  }
}

/* ── HTML escaping ── */

/**
 * Escape a string for safe insertion into innerHTML / attribute contexts.
 * Covers &, <, >, ", ' to prevent XSS via user-controlled data
 * (filenames, manifest fields, tags, labels).
 *
 * @param {string} s - Raw string
 * @returns {string} HTML-safe string
 */
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
}

/**
 * Validate a string as a safe CSS class name suffix.
 * Returns the string if it matches [a-zA-Z0-9_-]+, otherwise returns 'unknown'.
 *
 * @param {string} s - Raw class name candidate
 * @returns {string} Safe class name
 */
function safeClass(s) {
  return /^[a-zA-Z0-9_-]+$/.test(s) ? s : 'unknown'
}

/* ── Toast ── */

/**
 * Show a transient toast message. Auto-dismisses after duration ms.
 * Multiple toasts stack vertically.
 *
 * @param {string} message - Text to display
 * @param {'info'|'error'} [variant='info'] - Visual variant (sets .toast-info or .toast-error)
 * @param {number} [duration=3000] - Auto-dismiss delay in ms
 */
function showToast(message, variant = 'info', duration = 3000) {
  let stack = document.getElementById('toast-stack')
  if (!stack) {
    stack = document.createElement('div')
    stack.id = 'toast-stack'
    stack.className = 'toast-stack'
    /* aria-live announces toasts to screen readers without stealing focus.
       'polite' batches announcements; individual error toasts escalate to
       'assertive' via role="alert" below. */
    stack.setAttribute('aria-live', 'polite')
    stack.setAttribute('aria-atomic', 'false')
    document.body.appendChild(stack)
  }
  const isError = variant === 'error'
  const toast = document.createElement('div')
  toast.className = `toast toast-${isError ? 'error' : 'info'}`
  /* Error toasts get role="alert" → assertive announcement; info toasts
     inherit polite announcement from the stack container. */
  if (isError) toast.setAttribute('role', 'alert')
  toast.textContent = message
  stack.appendChild(toast)
  setTimeout(() => {
    toast.classList.add('toast-leaving')
    setTimeout(() => toast.remove(), 200)
  }, duration)
}

/* ── Downloads dropdown ── */

/**
 * Initialize a downloads dropdown with async handlers and error toasts.
 *
 * Behavior:
 * - Clicking the toggle toggles `.open` class on the menu (CSS handles visibility)
 * - Clicking outside the dropdown closes it
 * - Each entry button gets a click handler that invokes entry.handler
 * - During async handlers, the button gets `data-loading="true"` (CSS handles visual)
 * - On handler rejection, shows an error toast via showToast + logs to console.error
 * - Loading state is always cleared in `finally`, even on error
 *
 * The button's innerHTML (label + hint) is preserved — loading state is purely attribute-based.
 *
 * @param {Object} config
 * @param {string} config.dropdownId - ID of the .dl-wrap container
 * @param {string} config.toggleId - ID of the .dl-toggle button
 * @param {string} config.menuId - ID of the .dl-menu panel
 * @param {Array<{id: string, label: string, hint?: string, handler: () => (Promise<void>|void)}>} config.entries
 */
function initDownloads(config) {
  const wrap = document.getElementById(config.dropdownId)
  const toggle = document.getElementById(config.toggleId)
  const menu = document.getElementById(config.menuId)
  if (!wrap || !toggle || !menu) return

  toggle.addEventListener('click', (e) => {
    e.stopPropagation()
    menu.classList.toggle('open')
  })
  /* Guard the document-level outside-click listener with a dataset sentinel
     so repeated initDownloads calls on the same wrap don't stack listeners. */
  if (!wrap.dataset.dlInitialised) {
    wrap.dataset.dlInitialised = 'true'
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) menu.classList.remove('open')
    })
  }

  menu.innerHTML = ''
  for (const entry of config.entries) {
    const btn = document.createElement('button')
    btn.className = 'dl-item'
    /* Validate id to prevent accidental selector breakage or multi-word IDs
       from crafted config. safeClass returns 'unknown' for invalid input. */
    btn.id = safeClass(entry.id)
    btn.type = 'button'
    btn.innerHTML = `${escHtml(entry.label)}${entry.hint ? `<span class="dl-hint">${escHtml(entry.hint)}</span>` : ''}`
    btn.addEventListener('click', async () => {
      btn.dataset.loading = 'true'
      try {
        await entry.handler()
      } catch (err) {
        const msg = err?.message ? err.message : String(err)
        showToast(`Download failed: ${msg}`, 'error', 5000)
        /* Log only the message — avoid dumping full error objects that may
           carry response bodies, headers, or other sensitive details. */
        console.error('[initDownloads]', entry.id, msg)
      } finally {
        /* Use removeAttribute — delete btn.dataset.loading is not guaranteed
           by the spec to remove the underlying data-loading DOM attribute. */
        btn.removeAttribute('data-loading')
      }
    })
    menu.appendChild(btn)
  }
}

/* ── Thumbnail resize ──
   Galleries expose state as `window.thumbSize = N` and define a top-level
   `function render()`. The shared resizeThumb clamps by window.THUMB_MIN/MAX,
   updates #sizeLabel, and calls render(). Override MIN/MAX per-gallery before
   first call if a different range is needed. */

window.THUMB_MIN = 40
window.THUMB_MAX = 400

/**
 * Clamp window.thumbSize by delta, update #sizeLabel, re-render.
 * @param {number} d - Delta in px (e.g. -20, +20)
 */
function resizeThumb(d) {
  const cur = typeof window.thumbSize === 'number' ? window.thumbSize : 120
  window.thumbSize = Math.max(window.THUMB_MIN, Math.min(window.THUMB_MAX, cur + d))
  const lbl = document.getElementById('sizeLabel')
  if (lbl) lbl.textContent = window.thumbSize
  if (typeof render === 'function') render()
}

/* ── Dynamic pivot seg builder ── */

/**
 * Build Col/Row segmented control buttons from a DIMS object.
 *
 * Replaces hardcoded `<button class="seg" data-v="...">` HTML in a template
 * with dynamic buttons iterating Object.entries(dims). Each dim becomes a seg
 * button; a "None" button is auto-prepended as the first option.
 *
 * **Initial active state:** controlled by the `initial` argument. Defaults to
 * `{col: 'none', row: 'none'}`. Pass `{col, row}` to restore a specific axis
 * selection — used by pivot-gallery to preserve its `Row: Batch` default, and
 * by multi-mode templates that want to rehydrate state on mode switch.
 *
 * Wires click handlers via the existing `wireSegs` pattern — clicking a button
 * toggles its `.on` class and invokes `onChange(axis, dimKey)`.
 *
 * @param {Object} dims - { key: { label: string, fn: Function, order?: string[] } }
 * @param {string} colBarId - ID of the Col .segs container
 * @param {string} rowBarId - ID of the Row .segs container
 * @param {(axis: 'col'|'row', dimKey: string) => void} onChange - Called on selection change
 * @param {{col?: string, row?: string}} [initial] - Initial active dim per axis. Defaults to none/none.
 */
function buildPivotSegsFromDims(dims, colBarId, rowBarId, onChange, initial) {
  const colBar = document.getElementById(colBarId)
  const rowBar = document.getElementById(rowBarId)
  if (!colBar || !rowBar) return

  const colActive = initial?.col || 'none'
  const rowActive = initial?.row || 'none'

  const mkSegs = (active) => {
    const parts = [`<button class="seg${active === 'none' ? ' on' : ''}" data-v="none">None</button>`]
    for (const [key, dim] of Object.entries(dims)) {
      parts.push(
        `<button class="seg${active === key ? ' on' : ''}" data-v="${escHtml(key)}">${escHtml(dim.label)}</button>`,
      )
    }
    return parts.join('')
  }

  colBar.innerHTML = mkSegs(colActive)
  rowBar.innerHTML = mkSegs(rowActive)

  wireSegs(colBarId, (v) => onChange('col', v))
  wireSegs(rowBarId, (v) => onChange('row', v))
}

    : '';

  return `<div class="comp-card" data-card-id="${card._idx}">
    <img class="card-img" src="${escHtml(card.image)}" data-label="${escHtml(card.title)}" loading="lazy" alt="${escHtml(card.title)}">
    <div class="card-body">
      <div class="card-title">${escHtml(card.title)}</div>
      ${badges ? '<div class="badges">' + badges + '</div>' : ''}
      ${specs ? '<table class="specs-table">' + specs + '</table>' : ''}
      ${verdict}
    </div>
  </div>`;
}

/* ── Render ── */

function render() {
  const el = document.getElementById('gallery');
  const filtered = sortCards(getFiltered());
  const total = CARDS.length;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">No cards match the current filters.</div>';
    document.getElementById('stats').textContent = '0 / ' + total;
    return;
  }

  /* Index visible cards for reference */
  filtered.forEach((c, i) => c._idx = i);

  if (!SECTIONS.length) {
    /* No sections — flat grid */
    el.innerHTML = `<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">` +
      filtered.map(mkCard).join('') + '</div>';
  } else {
    /* Group by section */
    let html = '';
    for (const sec of SECTIONS) {
      const secCards = filtered.filter(c => c.section === sec.id);
      if (!secCards.length) continue;
      html += `<div class="section-hdr">
        <h2>${escHtml(sec.title)}</h2>
        ${sec.subtitle ? '<div class="section-sub">' + escHtml(sec.subtitle) + '</div>' : ''}
      </div>
      <div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">
        ${secCards.map(mkCard).join('')}
      </div>`;
    }
    /* Cards with no matching section */
    const orphans = filtered.filter(c => !SECTIONS.find(s => s.id === c.section));
    if (orphans.length) {
      html += `<div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cardMinWidth}px,1fr))">` +
        orphans.map(mkCard).join('') + '</div>';
    }
    el.innerHTML = html;
  }

  document.getElementById('stats').textContent = filtered.length + ' / ' + total;
}

/* ── Lightbox ── */

function openLb(src, label) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbLabel').textContent = label || '';
  document.getElementById('lb').classList.add('active');
}

function closeLb() { document.getElementById('lb').classList.remove('active'); }

function closeLbOutside(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLb();
});

// Delegated click handler for card images (avoids inline onclick with user data)
document.getElementById('gallery').addEventListener('click', e => {
  const img = e.target.closest('[data-label]');
  if (img) openLb(img.src, img.dataset.label);
});

/* ── Sort wiring (delegated to gallery-base.js) ── */

wireSegs('sortSegs', v => { sortMode = v; render(); });

/* ── Theme (delegated to gallery-base.js) ── */

/* ── Boot ── */

const S = initTheme(STORE_KEY);

if (!CARDS.length) {
  document.getElementById('gallery').innerHTML = '<div class="empty">No CARDS configured — fill in the CARDS array.</div>';
  document.getElementById('stats').textContent = '0 / 0';
} else {
  buildDimFilters(CARDS, FILTERS_DIMS, filters, 'filterBar', render);
  render();
}
</script>
</body>
