<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Forge — Design Theme Variants Gallery">

<title>Forge — Design Theme Variants Gallery</title>
<!-- diagram-meta:start -->
<meta name="diagram:title" content="Forge — Design Theme Variants Gallery">
<meta name="diagram:date" content="2026-04-23">
<meta name="diagram:category" content="showcase">
<meta name="diagram:cat-label" content="Showcase">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shared/gallery-base.css">
<style>
/* ── Theme-specific overrides (Roxabi brand) ── */
:root {
  --accent: #f0b429;
  --accent-dim: rgba(240,180,41,0.12);
}

/* ── Page layout ── */
body {
  padding: 32px 24px 64px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── Batch bar ── */
.batch-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.batch-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.batch-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.batch-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 160px), 1fr));
  gap: 16px;
}
:root { --thumb-size: 160px; }

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card.hidden { display: none; }
.card.starred { border-color: var(--amber); }
.card.starred::after {
  content: '★';
  position: absolute;
  top: 8px;
  right: 8px;
  color: var(--amber);
  font-size: 14px;
  z-index: 3;
  text-shadow: 0 0 8px rgba(240,180,41,0.5);
}

/* ── Card image swatch ── */
.card-swatch {
  width: 100%;
  aspect-ratio: 1/1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.card-swatch .theme-preview {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.theme-preview .preview-icon {
  font-size: 32px;
  opacity: 0.9;
}
.theme-preview .preview-text {
  font-family: var(--mono);
  font-size: 10px;
  opacity: 0.6;
  letter-spacing: 0.05em;
}

/* Theme-specific gradient swatches */
.swatch-cool-minimal { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #94a3b8 100%); color: #334155; }
.swatch-warm-editorial { background: linear-gradient(135deg, #fef7ed 0%, #fed7aa 50%, #fdba74 100%); color: #7c2d12; }
.swatch-dark-tech { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); color: #38bdf8; }
.swatch-lyra-orange { background: linear-gradient(135deg, #1c1917 0%, #292524 50%, #e85d04 100%); color: #fb923c; }
.swatch-roxabi-gold { background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #f0b429 100%); color: #fbbf24; }
.swatch-terminal-green { background: linear-gradient(135deg, #0a0f0a 0%, #0f1a0f 50%, #22c55e 100%); color: #4ade80; }
.swatch-amber-dark { background: linear-gradient(135deg, #0c0a09 0%, #1c1917 50%, #f0b429 100%); color: #fcd34d; }
.swatch-forest-night { background: linear-gradient(135deg, #052e16 0%, #14532d 50%, #166534 100%); color: #86efac; }

/* ── Badge ── */
.badge-theme {
  position: absolute;
  top: 8px;
  left: 8px;
  z-index: 2;
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: 0.05em;
}
.badge-light { background: rgba(255,255,255,0.85); color: #1a1d2b; border: 1px solid rgba(0,0,0,0.1); }
.badge-dark { background: rgba(0,0,0,0.6); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.15); }

/* ── Info section ── */
.info {
  padding: 10px 12px 12px;
}
.info .label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.info .tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tag {
  font-size: 9px;
  font-family: var(--mono);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.03em;
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border);
}

/* ── Star button ── */
.star-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 3;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-xdim);
  transition: color 0.2s;
  line-height: 1;
  padding: 4px;
}
.star-btn:hover { color: var(--amber); }
.card.starred .star-btn { color: var(--amber); }

/* ── Lightbox ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.lightbox.open { display: flex; }
.lb-swatch {
  width: 50vmin;
  height: 50vmin;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.lb-swatch .preview-icon { font-size: 64px; opacity: 0.9; }
.lb-swatch .preview-text { font-family: var(--mono); font-size: 14px; opacity: 0.6; }
.lb-meta {
  margin-top: 24px;
  text-align: center;
  max-width: 500px;
}
.lb-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.lb-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 8px;
}
.lb-tags .tag { font-size: 10px; padding: 3px 10px; }
.lb-desc {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  max-width: 400px;
}
.lb-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 36px;
  color: var(--text-xdim);
  cursor: pointer;
  padding: 16px 24px;
  user-select: none;
  line-height: 1;
  transition: color 0.15s;
}
.lb-btn:hover { color: var(--accent); }
.lb-prev { left: 12px; }
.lb-next { right: 12px; }
.lb-close {
  position: absolute;
  top: 18px;
  right: 22px;
  font-size: 20px;
  color: var(--text-xdim);
  cursor: pointer;
  transition: color 0.15s;
}
.lb-close:hover { color: var(--text); }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-xdim);
  font-size: 14px;
}

/* ── Footer ── */
footer {
  text-align: center;
  margin-top: 48px;
  font-size: 11px;
  color: var(--text-xdim);
  font-family: var(--mono);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .grid { gap: 12px; }
  .card { border-radius: 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Design <span>Theme Variants</span></h1>
    <div class="sub">8 curated palettes for forge galleries</div>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
</div>

<div class="toolbar" id="filterBar">
  <div class="ctrl">
    <span class="ctrl-label">Search</span>
    <input type="text" class="filter-input search-input" id="searchInput" placeholder="Filter themes...">
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Size</span>
    <button class="size-btn" onclick="resizeThumb(-20)">−</button>
    <span class="size-label" id="sizeLabel">160</span>
    <button class="size-btn" onclick="resizeThumb(20)">+</button>
  </div>
  <span class="stats">Visible: <span id="visCount">8</span> / <span id="totalCount">8</span></span>
</div>

<div class="batch-bar" id="batchBar"></div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lb" onclick="closeLb(event)">
  <span class="lb-close" onclick="closeLb()">✕</span>
  <span class="lb-btn lb-prev" onclick="lbNav(-1,event)">‹</span>
  <div class="lb-swatch" id="lbSwatch"></div>
  <div class="lb-meta">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-tags" id="lbTags"></div>
    <div class="lb-desc" id="lbDesc"></div>
  </div>
  <span class="lb-btn lb-next" onclick="lbNav(1,event)">›</span>
</div>

<footer>Forge Showcase · showcase-gallery.html · 2026-04-23</footer>

<script src="../../_shared/gallery-base.js"></script>
<script>
// ── Theme catalogue (static) ─────────────────────────────────────────────────────
const ITEMS = [
  {
    id: 'cool-minimal',
    label: 'Cool Minimal',
    tags: ['light', 'minimal', 'clean'],
    swatch: 'swatch-cool-minimal',
    icon: '❄',
    desc: 'Crisp whites and cool grays. Ideal for technical docs, API references, and minimalist portfolios.'
  },
  {
    id: 'warm-editorial',
    label: 'Warm Editorial',
    tags: ['light', 'editorial', 'warm'],
    swatch: 'swatch-warm-editorial',
    icon: '☀',
    desc: 'Soft creams and warm oranges. Perfect for lifestyle content, magazines, and human-centered stories.'
  },
  {
    id: 'dark-tech',
    label: 'Dark Tech',
    tags: ['dark', 'tech', 'modern'],
    swatch: 'swatch-dark-tech',
    icon: '⚡',
    desc: 'Deep slate with electric cyan accents. Built for developer tools, dashboards, and technical showcases.'
  },
  {
    id: 'lyra-orange',
    label: 'Lyra Orange',
    tags: ['dark', 'brand', 'warm'],
    swatch: 'swatch-lyra-orange',
    icon: '🔥',
    desc: 'Lyra brand palette — charcoal base with vibrant orange. Designed for AI agent interfaces and chat.'
  },
  {
    id: 'roxabi-gold',
    label: 'Roxabi Gold',
    tags: ['dark', 'brand', 'amber'],
    swatch: 'swatch-roxabi-gold',
    icon: '✦',
    desc: 'Roxabi hub palette — midnight dark with warm amber accent. The default forge gallery theme.'
  },
  {
    id: 'terminal-green',
    label: 'Terminal Green',
    tags: ['dark', 'terminal', 'retro'],
    swatch: 'swatch-terminal-green',
    icon: '⌘',
    desc: 'Matrix-inspired phosphor green on black. For hackers, sysadmins, and retro-computing vibes.'
  },
  {
    id: 'amber-dark',
    label: 'Amber Dark',
    tags: ['dark', 'brand', 'amber'],
    swatch: 'swatch-amber-dark',
    icon: '◈',
    desc: 'Near-black with rich amber highlights. A refined alternative to Roxabi Gold for formal presentations.'
  },
  {
    id: 'forest-night',
    label: 'Forest Night',
    tags: ['dark', 'nature', 'organic'],
    swatch: 'swatch-forest-night',
    icon: '🌲',
    desc: 'Deep evergreen tones with fresh lime accents. Suited for sustainability, outdoors, and eco themes.'
  }
];

// Default starred items
const DEFAULT_STARRED = ['roxabi-gold', 'lyra-orange', 'dark-tech'];

// ── State ────────────────────────────────────────────────────────────────────────
const STORE_KEY = 'forge-showcase-theme';
let state = null;
let starred = null;
let filters = {};
let visibleItems = [];
let lbIndex = 0;
window.thumbSize = 160;

// ── Dimensions for filters ───────────────────────────────────────────────────────
const DIMS = {
  theme: {
    label: 'Theme',
    fn: item => item.tags.includes('dark') ? 'dark' : 'light',
    order: ['dark', 'light']
  },
  style: {
    label: 'Style',
    fn: item => {
      if (item.tags.includes('brand')) return 'brand';
      if (item.tags.includes('minimal')) return 'minimal';
      if (item.tags.includes('editorial')) return 'editorial';
      if (item.tags.includes('tech')) return 'tech';
      if (item.tags.includes('terminal')) return 'terminal';
      if (item.tags.includes('nature')) return 'nature';
      return 'other';
    },
    order: ['brand', 'minimal', 'editorial', 'tech', 'terminal', 'nature']
  }
};

// ── Render ──────────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();

  // Apply dimension filters
  let filtered = applyDimFilters(ITEMS, DIMS, filters);

  // Apply search filter
  if (searchTerm) {
    filtered = filtered.filter(item =>
      item.label.toLowerCase().includes(searchTerm) ||
      item.tags.some(t => t.toLowerCase().includes(searchTerm)) ||
      (item.desc || '').toLowerCase().includes(searchTerm)
    );
  }

  visibleItems = filtered;
  document.getElementById('visCount').textContent = visibleItems.length;
  document.getElementById('totalCount').textContent = ITEMS.length;

  // Update grid column size
  document.documentElement.style.setProperty('--thumb-size', window.thumbSize + 'px');

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No themes match your filters</div>';
    return;
  }

  filtered.forEach((item, i) => {
    const div = document.createElement('div');
    const isLight = item.tags.includes('light');
    const isStarred = starred.has(item.id);

    div.className = 'card' + (isStarred ? ' starred' : '');
    div.dataset.tags = item.tags.join(',');
    div.dataset.idx = ITEMS.indexOf(item);

    div.innerHTML = `
      <span class="badge-theme badge-${isLight ? 'light' : 'dark'}">${isLight ? 'LIGHT' : 'DARK'}</span>
      <div class="card-swatch ${item.swatch}">
        <div class="theme-preview">
          <span class="preview-icon">${item.icon}</span>
          <span class="preview-text">${item.id.toUpperCase().replace(/-/g, ' ')}</span>
        </div>
      </div>
      <div class="info">
        <div class="label">${item.label}</div>
        <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <button class="star-btn" onclick="toggleStar(event,'${item.id}',this.closest('.card'))">★</button>
    `;

    div.querySelector('.card-swatch').onclick = () => openLb(ITEMS.indexOf(item));
    div.querySelector('.info').onclick = () => openLb(ITEMS.indexOf(item));

    grid.appendChild(div);
  });
}

// ── Star ────────────────────────────────────────────────────────────────────────
function toggleStar(e, id, card) {
  e.stopPropagation();
  const nowStarred = starred.toggle(id);
  card.classList.toggle('starred', nowStarred);
  document.getElementById('starCount').textContent = starred.size;
}

// ── Lightbox ────────────────────────────────────────────────────────────────────
function openLb(idx) {
  lbIndex = idx;
  renderLb();
  document.getElementById('lb').classList.add('open');
}

function renderLb() {
  const item = ITEMS[lbIndex];
  const isLight = item.tags.includes('dark') ? false : item.tags.includes('light');

  const swatch = document.getElementById('lbSwatch');
  swatch.className = `lb-swatch ${item.swatch}`;
  swatch.innerHTML = `
    <span class="preview-icon">${item.icon}</span>
    <span class="preview-text">${item.id.toUpperCase().replace(/-/g, ' ')}</span>
  `;

  document.getElementById('lbTitle').textContent = item.label;
  document.getElementById('lbTags').innerHTML = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('lbDesc').textContent = item.desc || '';
}

function lbNav(dir, e) {
  if (e) e.stopPropagation();
  // Navigate through all items, not just visible
  lbIndex = (lbIndex + dir + ITEMS.length) % ITEMS.length;
  renderLb();
}

function closeLb(e) {
  if (!e || e.target === document.getElementById('lb') || e.target.classList.contains('lb-close')) {
    document.getElementById('lb').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'Escape') closeLb({ target: lb });
});

// ── Search ──────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', render);

// ── Boot ────────────────────────────────────────────────────────────────────────
(() => {
  // Initialize theme toggle
  state = initTheme(STORE_KEY);

  // Initialize starred with defaults
  starred = initStarred(STORE_KEY);

  // Seed default starred if empty
  if (starred.size === 0) {
    DEFAULT_STARRED.forEach(id => starred.toggle(id));
  }
  document.getElementById('starCount').textContent = starred.size;

  // Build batch bar (single batch for showcase)
  buildBatchBar({
    barId: 'batchBar',
    batches: [{ id: 'themes', label: 'All Themes', dir: '' }],
    counts: { themes: ITEMS.length },
    total: ITEMS.length,
    onSelect: (batchId) => render()
  });

  // Build dimension filters
  buildDimFilters(ITEMS, DIMS, filters, 'filterBar', render);

  // Initial render
  render();
})();
</script>
</body>
</html>
