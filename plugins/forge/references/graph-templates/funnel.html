<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<!-- diagram-meta:end -->
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── design tokens (subset of fgraph palette — no @import needed) ── */
:root {
  --bg: #0b0d10; --bg-panel: #11141a; --bg-card: #161a21;
  --border: #1f252e; --border-bright: #2b3340;
  --text: #e4e7ec; --text-dim: #9aa4b2; --text-muted: #6b7380;
  --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.12);
  --cyan:  #22d3ee; --cyan-dim:  rgba(34,211,238,0.12);
  --purple:#c084fc; --purple-dim:rgba(192,132,252,0.12);
  --green: #4ade80; --green-dim: rgba(74,222,128,0.12);
  --red:   #f87171; --red-dim:   rgba(248,113,113,0.12);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  padding: 32px 24px 40px;
  max-width: 960px;
  margin: 0 auto;
}
header { margin-bottom: 20px; }
.header-eyebrow {
  font-family: 'Space Mono', monospace; font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted);
}
h1 { font-size: 28px; font-weight: 700; margin: 6px 0 4px; }
h1 .accent { color: var(--cyan); }
.header-subtitle { color: var(--text-dim); font-size: 13px; margin: 0; }

/* ── chart wrap — square aspect, SVG uses full 0..100 viewBox ── */
.fgraph-wrap.funnel {
  position: relative;
  width: 100%;
  max-width: 520px;
  aspect-ratio: 1 / 1;
  margin: 0 auto 20px;
  background: var(--bg-panel);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  padding: 14px;
  box-sizing: border-box;
}
.fgraph-wrap.funnel svg {
  width: 100%; height: 100%; display: block; overflow: visible;
}

/* ── stage trapezoids ── */
.fg-funnel-stage {
  vector-effect: non-scaling-stroke;
  transition: opacity 0.15s;
}
.fg-funnel-stage:hover { opacity: 0.8; }

/* ── stage separator lines ── */
.fg-funnel-sep {
  stroke: var(--bg-panel);
  stroke-width: 0.8;
  vector-effect: non-scaling-stroke;
}

/* ── LEFT-GUTTER labels (outside the funnel bands, inside <svg>) ──
   Always legible regardless of band width. text-anchor: end, x=26.
   A thin connector line runs from x=26 to the funnel's left edge
   at that stage's vertical midpoint. ── */
.fg-funnel-label {
  font-family: 'Space Mono', monospace;
  font-size: 3.8px;
  fill: var(--text-dim);
  text-anchor: end;
  dominant-baseline: middle;
  pointer-events: none;
}
.fg-funnel-value {
  font-family: 'Space Mono', monospace;
  font-size: 3.2px;
  fill: var(--text-muted);
  text-anchor: end;
  dominant-baseline: middle;
  pointer-events: none;
}

/* ── connector tick (gutter → funnel left edge) ── */
.fg-funnel-connector {
  stroke: var(--border-bright);
  stroke-width: 0.35;
  stroke-dasharray: 1.2 0.8;
  vector-effect: non-scaling-stroke;
}

/* ── RIGHT-MARGIN conversion rate annotations ── */
.fg-funnel-conv {
  font-family: 'Space Mono', monospace;
  font-size: 3px;
  fill: var(--text-muted);
  text-anchor: start;
  dominant-baseline: middle;
  pointer-events: none;
}
.fg-funnel-conv-line {
  stroke: var(--border-bright);
  stroke-width: 0.35;
  stroke-dasharray: 1.2 0.8;
  vector-effect: non-scaling-stroke;
}
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">{{CATEGORY_LABEL}}</div>
  <h1>{{TITLE_PLAIN}} <span class="accent">{{TITLE_ACCENT}}</span></h1>
  <p class="header-subtitle">{{SUBTITLE}}</p>
</header>

<main>

<!-- ══════════════════════════════════════════════════════════════════
     FUNNEL CHART — authoring surface.

     DATA CONTRACT (fields from the Funnel / FunnelStage spec):

       Funnel {
         title:              string
         data: [             // N stages, N ≥ 1, values DESCENDING
           { label: string, value: number }   // FunnelStage
         ]
         showConversionRate: bool   // emit % between consecutive stages
         variant:            "trapezoid" | "rounded"
       }

     ZONES in the 0..100 viewBox:
       Left gutter  x = 0..26    — stage labels (right-anchored at x=26)
       Funnel body  centre x=55, half-width spans right of x=29
       Right margin x = 82..100  — conversion % (left-anchored at x=83)

     GEOMETRY RULES (pre-compute; zero JS at runtime):

       y_top = 8, y_bottom = 96, stage_h = (96 - 8) / N.

       Half-width formula — use sqrt-scale so visually extreme ratios
       (e.g. 12 000 → 400) still produce readable non-sliver bands:
         hw(v) = max(max_halfWidth * sqrt(v / data[0].value), min_halfWidth)
         max_halfWidth = 26  (funnel outer edge at cx±26 = x=29..81)
         min_halfWidth = 5   (absolute floor — prevents zero-area paths)

       LINEAR NOTE: if your data spans a narrow range (≤10× ratio), use
       linear scale instead: hw(v) = max(max_halfWidth*(v/data[0].value), min_halfWidth)
       The sqrt scale avoids invisible slivers for highly skewed funnels.

       For stage i (0-indexed):
         hw_top[i] = hw(data[i].value)
         hw_bot[i]:
           if i < N-1 → hw(data[i+1].value)
           else        → min_halfWidth

         y1 = y_top + i * stage_h
         y2 = y1 + stage_h

       Trapezoid <polygon> points (TL → TR → BR → BL):
         (cx - hw_top, y1)  (cx + hw_top, y1)
         (cx + hw_bot, y2)  (cx - hw_bot, y2)

       Rounded variant: swap <polygon> for <path> with quadratic-Bézier
       corners on the bottom two vertices (r ≈ 1.5 user units).

       LEFT-GUTTER LABELS (x=26, right-anchored; ALWAYS outside bands):
         label_y = (y1 + y2) / 2
         fg-funnel-label text:  x=26, y=label_y        — stage name
         fg-funnel-value text:  x=26, y=label_y+4.5    — formatted value
         Connector line:  x1=27, y=label_y  → x2=(cx - avg_hw), y=label_y
           where avg_hw = (hw_top + hw_bot) / 2

       CONVERSION RATE ANNOTATIONS (right margin, showConversionRate=true):
         At each stage boundary y = y_top + i * stage_h  (i ≥ 1):
           rate = data[i].value / data[i-1].value   (displayed as %)
           Connector: x1 = (cx + hw(data[i].value)), y=boundary_y  → x2=81
           Label:     x=83, y=boundary_y

       COLOUR defaults (all stages same tone, descending fill-opacity):
         stage 0 → fill-opacity 1.0
         stage 1 → fill-opacity 0.75
         stage 2 → fill-opacity 0.55
         stage 3 → fill-opacity 0.40
         stage 4+ → decrease by 0.15, floor 0.20
       Override per-stage color: semantic-tone token | #rrggbb inline style.

       DEGENERATE — 1 stage:
         Single trapezoid, y_top → y_bottom, hw_bot = min_halfWidth.
         No conversion annotations. No special-casing needed in the SVG.

     PLACEHOLDER TOKENS:
       {{TITLE}}, {{TITLE_PLAIN}}, {{TITLE_ACCENT}}, {{SUBTITLE}},
       {{CATEGORY_LABEL}}, {{DATE}}, {{CATEGORY}}, {{COLOR}}
       {{DIAGRAM_ARIA_LABEL}}
       {{STAGE_N_POINTS}}    — polygon points per stage
       {{LABEL_N_Y}}         — label_y per stage
       {{VALUE_N_Y}}         — label_y+4.5 per stage
       {{STAGE_N_LABEL}}     — stage name text
       {{STAGE_N_VALUE}}     — formatted value text
       {{CONNECTOR_N_X2}}    — funnel left edge x at stage midpoint
       {{SEP_N_X1/X2/Y}}     — separator line endpoints
       {{CONV_N_LX}}         — funnel right edge x at stage boundary
       {{CONV_N_RATE}}        — conversion % text
     ══════════════════════════════════════════════════════════════════ -->

<div class="fgraph-wrap funnel" role="img" aria-label="{{DIAGRAM_ARIA_LABEL}}">

  <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg"
       role="img" aria-labelledby="fn-title">

    <title id="fn-title">{{TITLE}}</title>

    <!-- ── STAGE TRAPEZOIDS ─────────────────────────────────────── -->
    <!-- Stage 0 — {{STAGE_0_LABEL}} (top / widest) -->
    <polygon class="fg-funnel-stage"
             fill="var(--cyan)" fill-opacity="1.0" stroke="none"
             points="{{STAGE_0_POINTS}}"/>

    <!-- Stage 1 -->
    <polygon class="fg-funnel-stage"
             fill="var(--cyan)" fill-opacity="0.75" stroke="none"
             points="{{STAGE_1_POINTS}}"/>

    <!-- Stage 2 -->
    <polygon class="fg-funnel-stage"
             fill="var(--cyan)" fill-opacity="0.55" stroke="none"
             points="{{STAGE_2_POINTS}}"/>

    <!-- Stage 3 (bottom / narrowest) -->
    <polygon class="fg-funnel-stage"
             fill="var(--cyan)" fill-opacity="0.40" stroke="none"
             points="{{STAGE_3_POINTS}}"/>

    <!-- ── SEPARATOR LINES ──────────────────────────────────────── -->
    <line class="fg-funnel-sep" x1="{{SEP_1_X1}}" y1="{{SEP_1_Y}}" x2="{{SEP_1_X2}}" y2="{{SEP_1_Y}}"/>
    <line class="fg-funnel-sep" x1="{{SEP_2_X1}}" y1="{{SEP_2_Y}}" x2="{{SEP_2_X2}}" y2="{{SEP_2_Y}}"/>
    <line class="fg-funnel-sep" x1="{{SEP_3_X1}}" y1="{{SEP_3_Y}}" x2="{{SEP_3_X2}}" y2="{{SEP_3_Y}}"/>

    <!-- ── LEFT-GUTTER LABELS (outside bands → always legible) ─── -->
    <!-- Stage 0: name at label_y, value at label_y+4.5 -->
    <text class="fg-funnel-label" x="26" y="{{LABEL_0_Y}}">{{STAGE_0_LABEL}}</text>
    <text class="fg-funnel-value" x="26" y="{{VALUE_0_Y}}">{{STAGE_0_VALUE}}</text>
    <line class="fg-funnel-connector" x1="27" y1="{{LABEL_0_Y}}" x2="{{CONNECTOR_0_X2}}" y2="{{LABEL_0_Y}}"/>

    <!-- Stage 1 -->
    <text class="fg-funnel-label" x="26" y="{{LABEL_1_Y}}">{{STAGE_1_LABEL}}</text>
    <text class="fg-funnel-value" x="26" y="{{VALUE_1_Y}}">{{STAGE_1_VALUE}}</text>
    <line class="fg-funnel-connector" x1="27" y1="{{LABEL_1_Y}}" x2="{{CONNECTOR_1_X2}}" y2="{{LABEL_1_Y}}"/>

    <!-- Stage 2 -->
    <text class="fg-funnel-label" x="26" y="{{LABEL_2_Y}}">{{STAGE_2_LABEL}}</text>
    <text class="fg-funnel-value" x="26" y="{{VALUE_2_Y}}">{{STAGE_2_VALUE}}</text>
    <line class="fg-funnel-connector" x1="27" y1="{{LABEL_2_Y}}" x2="{{CONNECTOR_2_X2}}" y2="{{LABEL_2_Y}}"/>

    <!-- Stage 3 -->
    <text class="fg-funnel-label" x="26" y="{{LABEL_3_Y}}">{{STAGE_3_LABEL}}</text>
    <text class="fg-funnel-value" x="26" y="{{VALUE_3_Y}}">{{STAGE_3_VALUE}}</text>
    <line class="fg-funnel-connector" x1="27" y1="{{LABEL_3_Y}}" x2="{{CONNECTOR_3_X2}}" y2="{{LABEL_3_Y}}"/>

    <!-- ── CONVERSION RATE ANNOTATIONS (right margin) ───────────
         showConversionRate=true: emit one block per stage boundary.
         Omit this section entirely when showConversionRate=false. -->
    <line class="fg-funnel-conv-line" x1="{{CONV_1_LX}}" y1="{{SEP_1_Y}}" x2="81" y2="{{SEP_1_Y}}"/>
    <text class="fg-funnel-conv" x="83" y="{{SEP_1_Y}}">{{CONV_0_1}}%</text>

    <line class="fg-funnel-conv-line" x1="{{CONV_2_LX}}" y1="{{SEP_2_Y}}" x2="81" y2="{{SEP_2_Y}}"/>
    <text class="fg-funnel-conv" x="83" y="{{SEP_2_Y}}">{{CONV_1_2}}%</text>

    <line class="fg-funnel-conv-line" x1="{{CONV_3_LX}}" y1="{{SEP_3_Y}}" x2="81" y2="{{SEP_3_Y}}"/>
    <text class="fg-funnel-conv" x="83" y="{{SEP_3_Y}}">{{CONV_2_3}}%</text>

  </svg>

</div>

</main>

</body>
</html>
