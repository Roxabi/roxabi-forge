<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<!-- diagram-meta:end -->
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* {{BASE_STYLES}} — inline reset.css + layout.css + typography.css + components.css + explainer-base.css */
/* {{AESTHETIC_STYLES}} — inline the chosen aesthetic */
</style>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: 'var(--surface)',
      primaryTextColor: 'var(--text)',
      primaryBorderColor: 'var(--accent)',
      lineColor: 'var(--text-dim)',
      background: 'var(--bg)',
      pie1: '#06b6d4',
      pie2: '#10b981',
      pie3: '#f59e0b',
      pie4: '#8b5cf6',
      pie5: '#f43f5e',
      pie6: '#64748b',
      pieTitleTextColor: 'var(--text)',
      pieSectionTextColor: 'var(--text)',
      pieLegendTextColor: 'var(--text-muted)',
      pieStrokeColor: 'var(--bg)',
      pieOuterStrokeColor: 'var(--border)'
    },
    pie: { useMaxWidth: false, textPosition: 0.75 }
  })
  window.__mermaidReady = mermaid
</script>
</head>
<body>

<header>
  <div class="header-eyebrow">{{CATEGORY_LABEL}}</div>
  <h1>{{TITLE_PLAIN}} <span class="accent">{{TITLE_ACCENT}}</span></h1>
  <p class="header-subtitle">{{SUBTITLE}}</p>
</header>

<main>

<!-- ══════════════════════════════════════════════════════════════════
     CUSTOMISE — Pie proportion

     Use this template when the content is:
       - A share / composition breakdown (time, cost, traffic, storage)
       - A before/after proportion comparison (pair two pies side-by-side)
       - Any single-axis "parts of a whole" view

     Mermaid `pie` rules:
       - Slices are declared as `"Label" : number`
       - Order is preserved; large → small reads naturally
       - `showData` prints the numeric value after the label
       - Aim for 3–7 slices; > 8 becomes unreadable — group small slices
         into "Other"

     Use pie when ONE value per category matters. For multi-axis
     comparison, use radar (P2/P3) or a stacked bar instead.
     ══════════════════════════════════════════════════════════════════ -->

<section class="diagram-section">
  <div class="diagram-shell">
    <div class="zoom-controls">
      <button data-zoom="in"  title="Zoom in">+</button>
      <button data-zoom="fit" title="Fit">⤢</button>
      <button data-zoom="out" title="Zoom out">−</button>
    </div>
    <div class="mermaid-container" data-mermaid-out id="diagram-pie"></div>
    <script type="text/plain" data-mermaid>
pie showData
    title {{TITLE}}
    "{{SLICE_1_LABEL}}" : {{SLICE_1_VALUE}}
    "{{SLICE_2_LABEL}}" : {{SLICE_2_VALUE}}
    "{{SLICE_3_LABEL}}" : {{SLICE_3_VALUE}}
    "{{SLICE_4_LABEL}}" : {{SLICE_4_VALUE}}
    "{{SLICE_5_LABEL}}" : {{SLICE_5_VALUE}}
    </script>
  </div>
</section>

</main>

<script type="module">
  const mermaid = window.__mermaidReady
  const sourceEl = document.querySelector('#diagram-pie').previousElementSibling
  const container = document.getElementById('diagram-pie')
  const { svg } = await mermaid.render('mermaid-svg-pie', sourceEl.textContent)
  container.innerHTML = svg
  const svgEl = container.querySelector('svg')
  if (svgEl) {
    svgEl.setAttribute('height', '100%')
    svgEl.setAttribute('width', '100%')
    svgEl.style.maxWidth = 'none'
    if (window.svgPanZoom) {
      const pz = svgPanZoom(svgEl, {
        zoomEnabled: true, panEnabled: true,
        controlIconsEnabled: false,
        fit: true, center: true,
        minZoom: 0.15, maxZoom: 15
      })
      document.querySelector('[data-zoom="in"]')?.addEventListener('click', () => pz.zoomIn())
      document.querySelector('[data-zoom="out"]')?.addEventListener('click', () => pz.zoomOut())
      document.querySelector('[data-zoom="fit"]')?.addEventListener('click', () => { pz.resetZoom(); pz.resetPan(); pz.fit(); pz.center() })
    }
  }
</script>

</body>
</html>
