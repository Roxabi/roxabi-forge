<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="{{TITLE}}">
<meta name="diagram:date"      content="{{DATE}}">
<meta name="diagram:category"  content="{{CATEGORY}}">
<meta name="diagram:cat-label" content="{{CAT_LABEL}}">
<meta name="diagram:color"     content="{{COLOR}}">
<!-- diagram-meta:end -->
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* {{BASE_STYLES}} — inline reset.css + layout.css + typography.css + components.css + explainer-base.css */
/* {{AESTHETIC_STYLES}} — inline the chosen aesthetic */
</style>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: 'var(--surface)',
      primaryTextColor: 'var(--text)',
      primaryBorderColor: 'var(--accent)',
      lineColor: 'var(--text-dim)',
      secondaryColor: 'var(--border)',
      background: 'var(--bg)',
      edgeLabelBackground: 'var(--surface)',
      nodeTextColor: 'var(--text-muted)',
      attributeBackgroundColorOdd: 'var(--surface)',
      attributeBackgroundColorEven: 'var(--bg)'
    },
    er: { useMaxWidth: false, layoutDirection: 'TB', minEntityWidth: 120, minEntityHeight: 80, fontSize: 12 }
  })
  window.__mermaidReady = mermaid
</script>
</head>
<body>

<header>
  <div class="header-eyebrow">{{CATEGORY_LABEL}}</div>
  <h1>{{TITLE_PLAIN}} <span class="accent">{{TITLE_ACCENT}}</span></h1>
  <p class="header-subtitle">{{SUBTITLE}}</p>
</header>

<main>

<!-- ══════════════════════════════════════════════════════════════════
     CUSTOMISE — Entity-relationship schema

     Use this template when the content is:
       - A database schema (tables + FK relationships)
       - A domain model (aggregates + references)
       - Any "nouns + how they connect" view

     Mermaid `erDiagram` cardinality (left-end -- right-end):
       ||--||   one to one              (both required)
       ||--o|   one to zero-or-one      (left required, right optional)
       ||--o{   one to zero-or-many     (one to many, most common)
       }o--o{   many to many            (join table)
       }|--||   one-or-many to one      (required on both sides)
       }|..|{   identifying variant     (dotted = non-identifying)

     Entity attributes:
       TYPE NAME PK/FK/UK "comment"
       TYPE NAME                       → no key, no comment
       string id PK                    → primary key
       uuid user_id FK                 → foreign key
       datetime created_at             → plain attribute

     Keep entities ≤ 12 per diagram; split into domain sub-diagrams above
     that threshold (e.g. auth / billing / inventory).
     ══════════════════════════════════════════════════════════════════ -->

<section class="diagram-section">
  <div class="diagram-shell">
    <div class="zoom-controls">
      <button data-zoom="in"  title="Zoom in">+</button>
      <button data-zoom="fit" title="Fit">⤢</button>
      <button data-zoom="out" title="Zoom out">−</button>
    </div>
    <div class="mermaid-container" data-mermaid-out id="diagram-er"></div>
    <script type="text/plain" data-mermaid>
erDiagram
    {{ENTITY_1}} ||--o{ {{ENTITY_2}} : "{{REL_1_LABEL}}"
    {{ENTITY_2}} ||--|| {{ENTITY_3}} : "{{REL_2_LABEL}}"
    {{ENTITY_1}} }o--o{ {{ENTITY_4}} : "{{REL_3_LABEL}}"

    {{ENTITY_1}} {
        string   id              PK "primary key"
        string   {{FIELD_1_1}}      "required"
        datetime created_at         "audit"
    }
    {{ENTITY_2}} {
        string   id              PK
        string   {{ENTITY_1_LOWER}}_id FK "parent ref"
        int      {{FIELD_2_1}}
        string   status
    }
    {{ENTITY_3}} {
        string   id              PK
        string   {{ENTITY_2_LOWER}}_id FK
        json     {{FIELD_3_1}}
    }
    {{ENTITY_4}} {
        string   id              PK
        string   label
    }
    </script>
  </div>
</section>

</main>

<script type="module">
  const mermaid = window.__mermaidReady
  const sourceEl = document.querySelector('#diagram-er').previousElementSibling
  const container = document.getElementById('diagram-er')
  const { svg } = await mermaid.render('mermaid-svg-er', sourceEl.textContent)
  container.innerHTML = svg
  const svgEl = container.querySelector('svg')
  if (svgEl) {
    svgEl.setAttribute('height', '100%')
    svgEl.setAttribute('width', '100%')
    svgEl.style.maxWidth = 'none'
    if (window.svgPanZoom) {
      const pz = svgPanZoom(svgEl, {
        zoomEnabled: true, panEnabled: true,
        controlIconsEnabled: false,
        fit: true, center: true,
        minZoom: 0.15, maxZoom: 15
      })
      document.querySelector('[data-zoom="in"]')?.addEventListener('click', () => pz.zoomIn())
      document.querySelector('[data-zoom="out"]')?.addEventListener('click', () => pz.zoomOut())
      document.querySelector('[data-zoom="fit"]')?.addEventListener('click', () => { pz.resetZoom(); pz.resetPan(); pz.fit(); pz.center() })
    }
  }
</script>

</body>
</html>
