<style>
/* ══ forge base reset ══ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
ul,ol{list-style:none;margin:0;padding:0}
button{cursor:pointer;font-family:inherit}

/* ══ lyra-v2 aesthetic tokens ══ */
:root{
  --bg:#0d1117;
  --bg-cell:#0f141a;
  --bg-panel:#13191f;
  --bg-card:#161b22;
  --border:#21262d;
  --border-hi:#30363d;
  --text:#fafafa;
  --text-muted:#8b93a1;
  --text-dim:#6b7280;
  --amber:#f59e0b;
  --green:#10b981;
  --cyan:#22d3ee;
  --purple:#c084fc;
  --plum:#a855f7;
  --red:#ef4444;
  --teal:#06b6d4;
  /* fd-class stroke color (all UML edges share one tone) */
  --fd-class-stroke:#8aa0bd;
  /* fd-engine plane vars (AC-6) */
  --fd-plane-uml:#8aa0bd;
  --fd-canvas-h:580px;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
}

/* ══ page shell ══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
.page{padding:22px 22px 60px;max-width:900px;margin:0 auto}

.lln{width:18px;height:0;border-radius:2px}
.lln.solid{border-top:2px solid var(--fd-class-stroke)}
.lln.dashed{border-top:2px dashed var(--fd-class-stroke)}

/* ══ stage ══ */
.stage-wrap{position:relative;border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-cell));overflow:auto;margin-bottom:22px}
.stage-wrap::-webkit-scrollbar{height:8px;width:8px}
.stage-wrap::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:8px}

/* ══ fd-engine canvas (AC-10: NO preserveAspectRatio) ══ */
.fd-canvas{position:relative;width:100%;min-height:var(--fd-canvas-h,580px)}
/* SVG overlay: pixel-space — position:absolute;inset:0 maps SVG coords to pixel space */
.fd-edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
/* UML class edges: single stroke color for all relationship types */
.fd-edges path{
  fill:none;
  stroke:var(--fd-class-stroke);
  stroke-width:1.5;
  opacity:.8;
  transition:opacity .15s
}
/* Dashed line types (realization, implements, dependency) */
.fd-edges path.fd-class-dashed{stroke-dasharray:5 3}
/* Edge label text */
.fd-edges .fd-elabel{font-family:var(--mono);font-size:9px;fill:var(--text-muted);opacity:.7}

/* ══ fd-node: UML class cards (simple-box base + attribute/method rows) ══ */
.fd-node{
  position:absolute;
  z-index:2;
  transform:translate(-50%,-50%);
  width:160px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-card));
  border:1px solid var(--border-hi);
  border-radius:6px;
  padding:0;
  cursor:default;
  font-family:var(--mono);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  overflow:hidden
}
/* Class title bar */
.fd-node .fd-title{
  font-size:11px;
  font-weight:700;
  color:var(--text);
  padding:6px 10px 4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:center;
  border-bottom:1px solid var(--border)
}
/* Stereotype label (interface/abstract) above class name */
.fd-node .fd-class-stereo{
  font-size:9px;
  color:var(--text-dim);
  text-align:center;
  padding:3px 10px 0;
  font-style:italic
}
/* Divider between sections */
.fd-node .fd-class-divider{
  height:1px;
  background:var(--border);
  margin:0
}
/* Attribute/method rows */
.fd-node .fd-class-row{
  font-size:9.5px;
  color:var(--text-muted);
  padding:2px 10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.5
}
.fd-node .fd-class-attr{color:var(--cyan)}
.fd-node .fd-class-method{color:var(--green)}

/* Interface modifier: dashed border */
.fd-node.fd-class-interface{
  border-style:dashed;
  border-color:var(--plum)
}
.fd-node.fd-class-interface .fd-title{
  color:var(--purple);
  border-bottom-color:var(--plum)
}
.fd-node.fd-class-interface .fd-class-stereo{color:var(--plum)}

/* Abstract modifier: italic name */
.fd-node.fd-class-abstract .fd-title{font-style:italic}
</style>

<!-- fd-engine inline bundle: core + edges + cards + class type (layers 1-3) -->
<!-- AC-9: particles OFF (descriptor.options.particles = false) -->
<!-- AC-10: SVG overlay uses position:absolute;inset:0 — NO viewBox/preserveAspectRatio -->
<!-- RD-1: elk.bundled.js was used at gen time only — NOT inlined here -->
<script>
;(function(){
'use strict'

/* ── fd/core.js ── */

var NS = 'http://www.w3.org/2000/svg'
var canvas = null
var svgEl   = null
var DESCRIPTOR = null
var nodeEl = {}

function boot(){
  DESCRIPTOR = JSON.parse(document.getElementById('fd-data').textContent)
  canvas = document.getElementById('fd-canvas')
  svgEl  = document.getElementById('fd-edges')

  // Set canvas height from descriptor (pre-computed by elk gen-time step)
  var h = DESCRIPTOR.canvas && DESCRIPTOR.canvas.height ? DESCRIPTOR.canvas.height : 560
  canvas.style.minHeight = h + 'px'

  // Render nodes with 'simple' card base (class type augments with rows in applyClassShapes)
  renderNodes(DESCRIPTOR.nodes)

  // Pixel-space positioning: x/y from bun elk step (RD-1)
  positionClassNodes(DESCRIPTOR.nodes)

  // Apply UML class card structure (stereotype, attribute/method rows)
  applyClassShapes(DESCRIPTOR.nodes)

  // Inject UML SVG markers into SVG overlay defs
  initClassMarkers()

  // Draw DOM-measured bezier edges
  draw(DESCRIPTOR.edges)

  // Apply UML arrow markers and dash patterns
  applyClassEdgeStyles(DESCRIPTOR.edges)

  // ResizeObserver: redraw edges on resize (node positions static, RD-1)
  new ResizeObserver(function(){
    draw(DESCRIPTOR.edges)
    applyClassEdgeStyles(DESCRIPTOR.edges)
  }).observe(canvas)
}

function rect(id){
  var el = nodeEl[id]
  var cr = canvas.getBoundingClientRect()
  var b  = el.getBoundingClientRect()
  return { cx: b.left - cr.left + b.width / 2, cy: b.top - cr.top + b.height / 2, w: b.width, h: b.height }
}

function pairKey(a, b){ return [a, b].sort().join('|') }

function faceFor(dx, dy, isSource, edge){
  if(edge){
    if(isSource  && edge.srcFace) return edge.srcFace
    if(!isSource && edge.dstFace) return edge.dstFace
  }
  if(Math.abs(dy) >= Math.abs(dx)){
    if(isSource) return dy > 0 ? 'bottom' : 'top'
    else         return dy > 0 ? 'top'    : 'bottom'
  } else {
    if(isSource) return dx > 0 ? 'right' : 'left'
    else         return dx > 0 ? 'left'  : 'right'
  }
}

function portAnchor(r, face, slotIdx, slotCount){
  var cx = r.cx, cy = r.cy, w = r.w, h = r.h
  var hw = w / 2, hh = h / 2
  var faceLen = (face === 'top' || face === 'bottom') ? w : h
  var spread  = Math.min(faceLen * 0.55, slotCount * 16)
  var step    = slotCount > 1 ? spread / (slotCount - 1) : 0
  var offset  = slotCount > 1 ? -spread / 2 + slotIdx * step : 0
  switch(face){
    case 'top':    return { x: cx + offset, y: cy - hh, nx:  0, ny: -1 }
    case 'bottom': return { x: cx + offset, y: cy + hh, nx:  0, ny:  1 }
    case 'left':   return { x: cx - hw,     y: cy + offset, nx: -1, ny:  0 }
    case 'right':  return { x: cx + hw,     y: cy + offset, nx:  1, ny:  0 }
    default:       return { x: cx, y: cy, nx: 0, ny: 0 }
  }
}

function stubLen(dx, dy){
  return Math.max(30, Math.min(220, Math.sqrt(dx * dx + dy * dy) * 0.35))
}

/* ── fd/cards.js (simple-box for class — rows added by applyClassShapes) ── */

function renderNodes(nodes){
  for(var i = 0; i < nodes.length; i++){
    var nd = nodes[i]
    var el = document.createElement('div')
    el.className = 'fd-node'
    el.dataset.id = nd.id
    // Simple-box: title only at render time; rows appended by applyClassShapes
    el.innerHTML = '<div class="fd-title">' + nd.n + '</div>'
    canvas.appendChild(el)
    nodeEl[nd.id] = el
  }
}

/* ── fd/types/class.js ── */

function positionClassNodes(nodes){
  for(var i = 0; i < nodes.length; i++){
    var nd = nodes[i]
    var el = nodeEl[nd.id]
    if(!el) continue
    el.style.left = (nd.x || 0) + 'px'
    el.style.top  = (nd.y || 0) + 'px'
    el.style.removeProperty('--x')
    el.style.removeProperty('--y')
  }
}

function buildClassRows(nd){
  var attrs   = nd.attributes || []
  var methods = nd.methods    || []
  var html = ''
  if(attrs.length > 0 || methods.length > 0){
    html += '<div class="fd-class-divider"></div>'
  }
  for(var i = 0; i < attrs.length; i++){
    html += '<div class="fd-class-row fd-class-attr">' + attrs[i] + '</div>'
  }
  if(attrs.length > 0 && methods.length > 0){
    html += '<div class="fd-class-divider"></div>'
  }
  for(var j = 0; j < methods.length; j++){
    html += '<div class="fd-class-row fd-class-method">' + methods[j] + '</div>'
  }
  return html
}

function applyClassShapes(nodes){
  for(var i = 0; i < nodes.length; i++){
    var nd  = nodes[i]
    var el  = nodeEl[nd.id]
    if(!el) continue
    var kind = nd.kind || ''

    if(kind === 'interface'){
      el.classList.add('fd-class-interface')
      // Add stereotype above title
      el.innerHTML = '<div class="fd-class-stereo">&laquo;interface&raquo;</div>' + el.innerHTML
    } else if(kind === 'abstract'){
      el.classList.add('fd-class-abstract')
      el.innerHTML = '<div class="fd-class-stereo">&laquo;abstract&raquo;</div>' + el.innerHTML
    }

    el.innerHTML += buildClassRows(nd)
  }
}

// ── UML SVG marker injection ──────────────────────────────────────────────────
// Injects marker defs for all 6 UML relationship arrow types.
// AC-10: no preserveAspectRatio / viewBox on any SVG element.
function initClassMarkers(){
  if(!svgEl) return
  var defs = svgEl.querySelector('defs')
  if(!defs){
    defs = document.createElementNS(NS, 'defs')
    svgEl.insertBefore(defs, svgEl.firstChild)
  }

  // CSS rules for marker stroke/fill colors (theme-aware via CSS vars)
  var styleEl = document.createElementNS(NS, 'style')
  styleEl.textContent = [
    '#fd-class-inheritance path { fill: var(--bg-card, #161b22); stroke: var(--fd-class-stroke, #8aa0bd); stroke-width: 1.5; }',
    '#fd-class-realization path { fill: var(--bg-card, #161b22); stroke: var(--fd-class-stroke, #8aa0bd); stroke-width: 1.5; }',
    '#fd-class-implements path { fill: var(--bg-card, #161b22); stroke: var(--fd-class-stroke, #8aa0bd); stroke-width: 1.5; }',
    '#fd-class-composition path { fill: var(--fd-class-stroke, #8aa0bd); stroke: none; }',
    '#fd-class-aggregation path { fill: var(--bg-card, #161b22); stroke: var(--fd-class-stroke, #8aa0bd); stroke-width: 1.5; }',
    '#fd-class-association path { fill: var(--fd-class-stroke, #8aa0bd); stroke: none; }',
    '#fd-class-dependency path { fill: var(--fd-class-stroke, #8aa0bd); stroke: none; }',
    '#fd-class-default path { fill: var(--fd-class-stroke, #8aa0bd); stroke: none; }',
  ].join('\n')
  defs.appendChild(styleEl)

  var markerDefs = [
    // Inheritance / realization / implements: open hollow triangle at arrow-head (target)
    { id: 'fd-class-inheritance', w: 12, h: 12, rx: 10, ry: 6, d: 'M0,0 L10,6 L0,12 Z' },
    { id: 'fd-class-realization',  w: 12, h: 12, rx: 10, ry: 6, d: 'M0,0 L10,6 L0,12 Z' },
    { id: 'fd-class-implements',   w: 12, h: 12, rx: 10, ry: 6, d: 'M0,0 L10,6 L0,12 Z' },
    // Composition: filled diamond at source (marker-start)
    { id: 'fd-class-composition',  w: 14, h: 10, rx: 0, ry: 5, d: 'M0,5 L6,0 L12,5 L6,10 Z' },
    // Aggregation: open diamond at source (marker-start)
    { id: 'fd-class-aggregation',  w: 14, h: 10, rx: 0, ry: 5, d: 'M0,5 L6,0 L12,5 L6,10 Z' },
    // Association / dependency / default: open arrowhead at target (marker-end)
    { id: 'fd-class-association',  w: 9, h: 9, rx: 7, ry: 4.5, d: 'M0,0 L7,4.5 L0,9' },
    { id: 'fd-class-dependency',   w: 9, h: 9, rx: 7, ry: 4.5, d: 'M0,0 L7,4.5 L0,9' },
    { id: 'fd-class-default',      w: 9, h: 9, rx: 7, ry: 4.5, d: 'M0,0 L7,4.5 L0,9' },
  ]

  for(var i = 0; i < markerDefs.length; i++){
    var def = markerDefs[i]
    if(svgEl.querySelector('#' + def.id)) continue
    var marker = document.createElementNS(NS, 'marker')
    marker.setAttribute('id', def.id)
    marker.setAttribute('markerWidth',  String(def.w))
    marker.setAttribute('markerHeight', String(def.h))
    marker.setAttribute('refX', String(def.rx))
    marker.setAttribute('refY', String(def.ry))
    marker.setAttribute('orient', 'auto')
    // AC-10: no setAttribute('preserveAspectRatio') — pixel-space only
    var path = document.createElementNS(NS, 'path')
    path.setAttribute('d', def.d)
    marker.appendChild(path)
    defs.appendChild(marker)
  }
}

// ── UML edge post-processing ─────────────────────────────────────────────────
// Maps edge.arrowType to the correct SVG marker and dash pattern.
// Composition/aggregation: marker-start (diamond at source end).
// All others: marker-end (arrowhead at target end).
function applyClassEdgeStyles(edges){
  if(!edges) return
  for(var i = 0; i < edges.length; i++){
    var edge = edges[i]
    var arrowType = edge.arrowType || 'default'
    // Directed key: "f>t" (consistent with edges.js directed dedup convention)
    var dirKey = edge.f + '>' + edge.t
    var pathEl = svgEl.querySelector('path[data-pk="' + dirKey + '"]')
    if(!pathEl) continue

    // Dashed line types: realization, implements, dependency
    if(arrowType === 'realization' || arrowType === 'implements' || arrowType === 'dependency'){
      pathEl.classList.add('fd-class-dashed')
    }

    if(arrowType === 'composition' || arrowType === 'aggregation'){
      // Diamond tail: marker at source end
      pathEl.setAttribute('marker-start', 'url(#fd-class-' + arrowType + ')')
      pathEl.removeAttribute('marker-end')
    } else {
      // Arrowhead: marker at target end
      pathEl.setAttribute('marker-end', 'url(#fd-class-' + arrowType + ')')
    }
  }
}

/* ── fd/edges.js ── */

var paths = []
var pathByPair = new Map()

function draw(edges){
  svgEl.querySelectorAll(':scope > path, :scope > text').forEach(function(n){ n.remove() })
  paths = []
  pathByPair.clear()

  if(!edges || !edges.length) return

  // Step 1: deduplicate edges into canonical pairs
  var seenPairs = new Map()
  for(var i = 0; i < edges.length; i++){
    var e = edges[i]
    var k = pairKey(e.f, e.t)
    if(!seenPairs.has(k)){
      seenPairs.set(k, { f: e.f, t: e.t, lab: e.label || null, edge: e })
    } else {
      if(e.label && !seenPairs.get(k).lab) seenPairs.get(k).lab = e.label
    }
  }
  var dedupedEdges = Array.from(seenPairs.values())

  // Step 2: build port maps
  var portMap = new Map()
  for(var j = 0; j < dedupedEdges.length; j++){
    var ref = dedupedEdges[j]
    var f = ref.f, t = ref.t, edge = ref.edge
    if(!nodeEl[f] || !nodeEl[t]) continue
    var rf = rect(f), rt = rect(t)
    var dx = rt.cx - rf.cx, dy = rt.cy - rf.cy
    var fFace = faceFor(dx, dy, true,  edge)
    var tFace = faceFor(dx, dy, false, edge)
    var fk = f + ':' + fFace, tk = t + ':' + tFace
    if(!portMap.has(fk)) portMap.set(fk, [])
    if(!portMap.has(tk)) portMap.set(tk, [])
    portMap.get(fk).push(j)
    portMap.get(tk).push(j)
  }

  // Step 3: draw one bezier path per deduped pair
  for(var m = 0; m < dedupedEdges.length; m++){
    var pair = dedupedEdges[m]
    var f2 = pair.f, t2 = pair.t, lab = pair.lab, edge2 = pair.edge
    if(!nodeEl[f2] || !nodeEl[t2]) continue

    var rf2 = rect(f2), rt2 = rect(t2)
    var dx2 = rt2.cx - rf2.cx, dy2 = rt2.cy - rf2.cy

    var fFace2 = faceFor(dx2, dy2, true,  edge2)
    var tFace2 = faceFor(dx2, dy2, false, edge2)
    var fk2 = f2 + ':' + fFace2, tk2 = t2 + ':' + tFace2

    var fSlots = portMap.get(fk2) || [m]
    var tSlots = portMap.get(tk2) || [m]
    var fi = Math.max(fSlots.indexOf(m), 0)
    var ti = Math.max(tSlots.indexOf(m), 0)

    var pu1 = portAnchor(rf2, fFace2, fi, fSlots.length)
    var pu2 = portAnchor(rt2, tFace2, ti, tSlots.length)

    var stb = stubLen(dx2, dy2)
    var c1x = pu1.x + pu1.nx * stb, c1y = pu1.y + pu1.ny * stb
    var c2x = pu2.x + pu2.nx * stb, c2y = pu2.y + pu2.ny * stb

    var dStr = 'M' + pu1.x.toFixed(1) + ',' + pu1.y.toFixed(1) +
      ' C' + c1x.toFixed(1) + ',' + c1y.toFixed(1) +
      ' '  + c2x.toFixed(1) + ',' + c2y.toFixed(1) +
      ' '  + pu2.x.toFixed(1) + ',' + pu2.y.toFixed(1)

    var p = document.createElementNS(NS, 'path')
    p.setAttribute('d', dStr)
    // Use directed key "f>t" for UML edges (applyClassEdgeStyles needs directional lookup)
    p.dataset.f  = f2
    p.dataset.t  = t2
    p.dataset.pk = f2 + '>' + t2
    svgEl.appendChild(p)
    paths.push(p)
    pathByPair.set(pairKey(f2, t2), p)

    // Edge label (de Casteljau midpoint)
    if(lab){
      var tx = document.createElementNS(NS, 'text')
      var mx = 0.125 * pu1.x + 0.375 * c1x + 0.375 * c2x + 0.125 * pu2.x
      var my = 0.125 * pu1.y + 0.375 * c1y + 0.375 * c2y + 0.125 * pu2.y
      tx.setAttribute('x', mx.toFixed(1))
      tx.setAttribute('y', (my - 5).toFixed(1))
      tx.setAttribute('text-anchor', 'middle')
      tx.setAttribute('class', 'fd-elabel')
      tx.textContent = lab
      svgEl.appendChild(tx)
    }
  }
}

/* ── bootstrap ── */

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot)
} else {
  boot()
}

}())
</script>
