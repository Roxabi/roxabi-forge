<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="/dev #22 — dev pipeline message flow">
<meta name="diagram:date"      content="2026-04-15">
<meta name="diagram:category"  content="forge">
<meta name="diagram:cat-label" content="Forge · pipeline">
<meta name="diagram:color"     content="green">
<!-- diagram-meta:end -->
<title>/dev #22 — dev pipeline message flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10; --bg-panel: #11141a; --bg-card: #161a21;
    --border: #1f252e; --border-bright: #2b3340;
    --text: #e4e7ec; --text-dim: #9aa4b2; --text-muted: #6b7380;
    --amber: #fbbf24; --cyan: #22d3ee; --purple: #c084fc; --green: #4ade80; --red: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 32px 24px 40px; max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  .header-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  h1 { font-size: 28px; font-weight: 700; margin: 6px 0 4px; }
  h1 .accent { color: var(--green); }
  .header-subtitle { color: var(--text-dim); font-size: 13px; margin: 0; }

  .fgraph-wrap {
    position: relative;
    width: 100%;
    --msg-count: 5;
    height: calc(120px + var(--msg-count) * 40px);
    max-width: 820px;
    margin: 0 auto 20px;
    background: var(--bg-panel);
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 10px;
    padding: 14px;
  }

  .fg-seq-participant {
    position: absolute;
    left: calc(var(--x, 50) * 1%);
    top: 6%;
    transform: translate(-50%, 0);
    padding: 5px 14px;
    background: var(--bg-card);
    border: 1.5px solid var(--border-bright);
    border-radius: 999px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text);
    white-space: nowrap;
    z-index: 2;
  }
  .fg-seq-participant.amber  { border-color: rgba(251,191,36,0.55);  color: var(--amber); }
  .fg-seq-participant.cyan   { border-color: rgba(34,211,238,0.55);  color: var(--cyan); }
  .fg-seq-participant.purple { border-color: rgba(192,132,252,0.55); color: var(--purple); }
  .fg-seq-participant.green  { border-color: rgba(74,222,128,0.55);  color: var(--green); }

  .fg-lifeline { position: absolute; left: calc(var(--x, 50) * 1%); top: 18%; bottom: 8%; width: 0; border-left: 1px dashed var(--border-bright); pointer-events: none; }
  .fg-lifeline-activation { position: absolute; left: calc(var(--x, 50) * 1%); top: calc(var(--y1, 30) * 1%); height: calc((var(--y2, 55) - var(--y1, 30)) * 1%); width: 6px; transform: translateX(-50%); background: rgba(74,222,128,0.18); border: 1px solid rgba(74,222,128,0.55); border-radius: 2px; }

  .fg-seq-msg-lbl {
    position: absolute;
    left: calc(var(--x, 50) * 1%);
    top:  calc(var(--y, 50) * 1%);
    transform: translate(-50%, -110%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    background: var(--bg-panel);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    z-index: 1;
  }

  .fgraph-edges .mk-green { fill: var(--green); }
  .fgraph-edges .mk-amber { fill: var(--amber); }
  .fgraph-edges .mk-cyan  { fill: var(--cyan); }
  .fgraph-edges .mk-purple { fill: var(--purple); }

  .fgraph-edges .fg-edge.amber  { stroke: var(--amber);  stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.cyan   { stroke: var(--cyan);   stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.purple { stroke: var(--purple); stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.green  { stroke: var(--green);  stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.dashed { stroke-dasharray: 4 3; }

  .fgraph-legend { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-family: 'Space Mono', monospace; font-size: 9.5px; color: var(--text-muted); pointer-events: none; }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Forge · pipeline</div>
  <h1>/dev <span class="accent">#22</span></h1>
  <p class="header-subtitle">Message flow through the dev-core pipeline for a single issue.</p>
</header>

<main>

<div class="fgraph-wrap" style="--msg-count: 5;" role="img"
     aria-label="Sequence diagram: User issues /dev #22 to /dev, which calls /plan, then /implement, then /pr. /pr returns a PR URL to the user.">

  <!-- ── PARTICIPANTS ─────────────────────────── -->
  <div class="fg-seq-participant amber"  style="--x:12">User</div>
  <div class="fg-seq-participant cyan"   style="--x:38">/dev</div>
  <div class="fg-seq-participant purple" style="--x:62">/plan</div>
  <div class="fg-seq-participant green"  style="--x:88">/implement → /pr</div>

  <!-- ── LIFELINES ────────────────────────────── -->
  <div class="fg-lifeline" style="--x:12"></div>
  <div class="fg-lifeline" style="--x:38"></div>
  <div class="fg-lifeline" style="--x:62"></div>
  <div class="fg-lifeline" style="--x:88"></div>

  <!-- /dev active while plan + implement run -->
  <div class="fg-lifeline-activation" style="--x:38; --y1:28; --y2:58"></div>

  <!-- ── MESSAGES ─────────────────────────────── -->
  <svg class="fgraph-edges" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"
       style="position:absolute; inset:0; width:100%; height:100%;">
    <defs>
      <marker id="fg-arr-amber"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-amber"/></marker>
      <marker id="fg-arr-cyan"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-cyan"/></marker>
      <marker id="fg-arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-purple"/></marker>
      <marker id="fg-arr-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-green"/></marker>
    </defs>
    <path class="fg-edge amber"         d="M 12,22 L 38,22" marker-end="url(#fg-arr-amber)"/>
    <path class="fg-edge cyan"          d="M 38,30 L 62,30" marker-end="url(#fg-arr-cyan)"/>
    <path class="fg-edge purple dashed" d="M 62,38 L 38,38" marker-end="url(#fg-arr-purple)"/>
    <path class="fg-edge cyan"          d="M 38,46 L 88,46" marker-end="url(#fg-arr-cyan)"/>
    <path class="fg-edge green dashed"  d="M 88,54 L 12,54" marker-end="url(#fg-arr-green)"/>
  </svg>

  <!-- ── LABELS ──────────────────────────────── -->
  <div class="fg-seq-msg-lbl" style="--x:25; --y:22;">/dev #22</div>
  <div class="fg-seq-msg-lbl" style="--x:50; --y:30;">decompose plan</div>
  <div class="fg-seq-msg-lbl" style="--x:50; --y:38;">plan approved</div>
  <div class="fg-seq-msg-lbl" style="--x:63; --y:46;">implement + open PR</div>
  <div class="fg-seq-msg-lbl" style="--x:50; --y:54;">PR URL</div>

  <div class="fgraph-legend">solid = forward call · dashed = return/ack · green box = /dev orchestrating</div>
</div>

</main>

</body>
</html>
