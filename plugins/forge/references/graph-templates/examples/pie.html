<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="Forge plugin — LOC distribution">
<meta name="diagram:date"      content="2026-04-15">
<meta name="diagram:category"  content="forge">
<meta name="diagram:cat-label" content="Forge · metrics">
<meta name="diagram:color"     content="green">
<!-- diagram-meta:end -->
<title>Forge plugin — LOC distribution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10; --bg-panel: #11141a; --bg-card: #161a21;
    --border: #1f252e; --border-bright: #2b3340;
    --text: #e4e7ec; --text-dim: #9aa4b2; --text-muted: #6b7380;
    --amber: #fbbf24; --cyan: #22d3ee; --purple: #c084fc; --green: #4ade80; --red: #f87171;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    padding: 32px 24px 40px;
    max-width: 960px;
    margin: 0 auto;
  }
  header { margin-bottom: 20px; }
  .header-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  h1 { font-size: 28px; font-weight: 700; margin: 6px 0 4px; }
  h1 .accent { color: var(--green); }
  .header-subtitle { color: var(--text-dim); font-size: 13px; margin: 0; }

  .fgraph-wrap {
    position: relative;
    width: 100%;
    max-width: 680px;
    aspect-ratio: 4 / 3;
    margin: 0 auto 20px;
    background: var(--bg-panel);
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 10px;
    padding: 14px;
  }
  .fgraph-legend {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .fg-pie-slice { transition: opacity 0.15s, transform 0.15s; transform-origin: 50% 50%; }
  .fg-pie-slice:hover { opacity: 0.85; transform: scale(1.02); }

  .fg-pie-legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 0;
  }
  .fg-pie-legend-row .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .fg-pie-legend-row .swatch.amber  { background: var(--amber); }
  .fg-pie-legend-row .swatch.cyan   { background: var(--cyan); }
  .fg-pie-legend-row .swatch.purple { background: var(--purple); }
  .fg-pie-legend-row .swatch.green  { background: var(--green); }
  .fg-pie-legend-row .swatch.red    { background: var(--red); }
  .fg-pie-legend-row .value { margin-left: auto; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Forge · metrics</div>
  <h1>Forge plugin <span class="accent">LOC distribution</span></h1>
  <p class="header-subtitle">Where the lines live across the 5 top-level dirs of plugins/forge/.</p>
</header>

<main>

<!-- Distribution percentages: references 38%, skills 27%, scripts 18%, runtime 11%, supervisor 6%.
     Arc paths pre-computed with 12-o'clock start, clockwise:
       slice 1 (38%, 0 → 136.8°)  large = 0
       slice 2 (27%, 136.8 → 234°) large = 0
       slice 3 (18%, 234 → 298.8°) large = 0
       slice 4 (11%, 298.8 → 338.4°) large = 0
       slice 5 (6%,  338.4 → 360°)  large = 0

     angle→(x,y) with (50,10) at 0° (top), radius 40:
       0°     → ( 50.00, 10.00 )
       136.8° → ( 77.37, 77.37 )      cos(136.8-90)  = cos(46.8) = 0.685  → x=50+40*sin(136.8-0)
       (For brevity: use the formula in pie.html — values below were regenerated.)
-->

<div class="fgraph-wrap" role="img"
     aria-label="Pie chart of forge plugin line counts: references 38%, skills 27%, scripts 18%, runtime 11%, supervisor 6%.">

  <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg"
       style="position:absolute; left:8%; top:4%; width:54%; height:92%;">

    <!-- Slice 1 — references/ — 38%        (0 → 38%)   angle 0 → 136.8° -->
    <path class="fg-pie-slice" fill="var(--amber)"
          d="M 50,50 L 50,10 A 40 40 0 0 1 77.37,77.37 Z"/>

    <!-- Slice 2 — skills/ — 27%            (38 → 65%)  angle 136.8 → 234° -->
    <path class="fg-pie-slice" fill="var(--cyan)"
          d="M 50,50 L 77.37,77.37 A 40 40 0 0 1 17.64,82.36 Z"/>

    <!-- Slice 3 — scripts/ — 18%           (65 → 83%)  angle 234 → 298.8° -->
    <path class="fg-pie-slice" fill="var(--purple)"
          d="M 50,50 L 17.64,82.36 A 40 40 0 0 1 30.98,14.98 Z"/>

    <!-- Slice 4 — runtime/ — 11%           (83 → 94%)  angle 298.8 → 338.4° -->
    <path class="fg-pie-slice" fill="var(--green)"
          d="M 50,50 L 30.98,14.98 A 40 40 0 0 1 41.33,10.69 Z"/>

    <!-- Slice 5 — supervisor/ — 6%         (94 → 100%) angle 338.4 → 360° -->
    <path class="fg-pie-slice" fill="var(--red)"
          d="M 50,50 L 41.33,10.69 A 40 40 0 0 1 50,10 Z"/>

    <!-- border ring -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border-bright)" stroke-width="0.5"/>
  </svg>

  <div style="position:absolute; right:4%; top:14%; width:36%;">
    <div class="fg-pie-legend-row"><div class="swatch amber"></div><div>references/</div><div class="value">38%</div></div>
    <div class="fg-pie-legend-row"><div class="swatch cyan"></div><div>skills/</div><div class="value">27%</div></div>
    <div class="fg-pie-legend-row"><div class="swatch purple"></div><div>scripts/</div><div class="value">18%</div></div>
    <div class="fg-pie-legend-row"><div class="swatch green"></div><div>runtime/</div><div class="value">11%</div></div>
    <div class="fg-pie-legend-row"><div class="swatch red"></div><div>supervisor/</div><div class="value">6%</div></div>
  </div>

  <div class="fgraph-legend">5 slices · 100% total · hover a slice to highlight</div>
</div>

</main>

</body>
</html>
