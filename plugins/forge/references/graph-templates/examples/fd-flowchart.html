<!DOCTYPE html>
<!-- Reference example — do not hand-copy. Regenerate with: python3 scripts/gen-fd.py --in descriptor.json --out diagram.html -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="diagram:title" content="forge-chart Skill — Request Processing Flow">
<meta name="diagram:category" content="flowchart">
<meta name="diagram:color" content="#22d3ee">
<meta name="diagram:engine" content="fd-engine">
<meta name="diagram:type" content="flowchart">
<title>forge-chart Skill — Request Processing Flow</title>
<!-- Google Fonts — degrades gracefully offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ forge base reset ══ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
ul,ol{list-style:none;margin:0;padding:0}
button{cursor:pointer;font-family:inherit}

/* ══ lyra-v2 aesthetic tokens ══ */
:root{
  --bg:#0d1117;
  --bg-cell:#0f141a;
  --bg-panel:#13191f;
  --bg-card:#161b22;
  --surface:#13191f;
  --border:#21262d;
  --border-hi:#30363d;
  --text:#fafafa;
  --text-muted:#8b93a1;
  --text-dim:#6b7280;
  --accent:#e85d04;
  --accent-2:#f97316;
  --teal:#06b6d4;
  --amber:#f59e0b;
  --green:#10b981;
  --cyan:#22d3ee;
  --purple:#c084fc;
  --plum:#a855f7;
  --red:#ef4444;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
  /* fd-engine plane colors (AC-6: derive from aesthetic tokens) */
  --fd-plane-flow:var(--cyan);
  --fd-plane-decision:var(--amber);
  --fd-plane-error:var(--red);
  --fd-plane-success:var(--green);
  --fd-plane-control:var(--cyan);
}

/* ══ page shell ══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
.page{padding:22px 22px 60px;max-width:960px;margin:0 auto}

/* ══ header ══ */
header{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;justify-content:space-between;
  padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.htitle h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
.htitle h1 b{color:var(--cyan)}
.htitle p{margin:5px 0 0;color:var(--text-muted);font-size:12px;font-family:var(--mono)}
.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-hi);color:var(--text-muted)}
.badge.cyan{border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.06);color:var(--cyan)}
.badge.amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--amber)}
.badge.green{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06);color:var(--green)}

/* ══ legend bar ══ */
.bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.lg{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-muted);
  background:var(--bg-panel);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-family:var(--mono)}
.lln{width:16px;height:0;border-top:2.5px solid;border-radius:2px}
.lsq{width:10px;height:10px;border-radius:2px;flex-shrink:0;transform:rotate(45deg)}
.lpill{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ══ stage wrapper ══ */
.stage-wrap{border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-cell));
  padding:16px;overflow:auto;margin-bottom:22px}

/* ══ fd-engine canvas (AC-10: no preserveAspectRatio) ══ */
.fd-canvas{position:relative;width:100%}

/* ══ fd-edges SVG overlay ══ */
/* AC-10: position:absolute;inset:0 — NOT viewBox/preserveAspectRatio stretch */
.fd-edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
.fd-edges path{fill:none;stroke-width:1.8;opacity:.75;transition:opacity .15s,stroke-width .15s}
/* plane stroke colors (AC-6: CSS vars from aesthetic tokens) */
.fd-edges path.flow    {stroke:var(--cyan)}
.fd-edges path.decision{stroke:var(--amber)}
.fd-edges path.error   {stroke:var(--red)}
.fd-edges path.success {stroke:var(--green)}
.fd-edges path.control {stroke:var(--cyan)}
/* edge label */
.fd-edges .fd-elabel{font-family:var(--mono);font-size:9px;fill:var(--text-muted)}

/* ══ fd-node base (flowchart — simple-box cards, RD-3) ══ */
.fd-node{
  position:absolute;
  z-index:2;
  transform:translate(-50%,-50%);
  width:140px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-card));
  border:1px solid var(--border-hi);
  border-radius:7px;
  padding:7px 10px;
  cursor:default;
  transition:transform .12s,box-shadow .15s,border-color .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.4)
}
.fd-node:hover{transform:translate(-50%,-50%) translateY(-2px);border-color:var(--border-hi);box-shadow:0 6px 20px rgba(0,0,0,.55)}
.fd-node .fd-title{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fd-node .fd-sub{font-size:9.5px;color:var(--text-dim);margin-top:2px;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ══ shape variants ══ */

/* Diamond: decision nodes (rotated square via clip-path, label centered inside) */
.fd-node.fd-shape-diamond{
  width:60px;
  height:60px;
  padding:0;
  border-radius:4px;
  clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.08));
  border-color:rgba(245,158,11,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center
}
.fd-node.fd-shape-diamond .fd-title{
  font-size:8.5px;
  line-height:1.25;
  white-space:normal;
  overflow:visible;
  text-overflow:initial;
  padding:0 4px
}
.fd-node.fd-shape-diamond .fd-sub{display:none}

/* Pill: terminal/start/end nodes (start = green tint, end = red tint) */
.fd-node.fd-shape-pill{
  width:100px;
  height:34px;
  padding:0;
  border-radius:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center
}
.fd-node.fd-shape-pill.fd-kind-start{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(16,185,129,.08));
  border-color:rgba(16,185,129,.45)
}
.fd-node.fd-shape-pill.fd-kind-end{
  background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.08));
  border-color:rgba(239,68,68,.45)
}
.fd-node.fd-shape-pill .fd-title{font-size:10px;font-weight:700}
.fd-node.fd-shape-pill .fd-sub{display:none}

/* Process box color tint (default — cyan accent line) */
.fd-node.fd-kind-process{border-left:2.5px solid var(--cyan)}
.fd-node.fd-kind-io{border-left:2.5px solid var(--purple)}
.fd-node.fd-kind-sub{border-left:2.5px solid var(--teal)}
</style>
</head>

<!-- fd-engine inline bundle: layers 1-3 (core + edges + cards + flowchart type) -->
<!-- Layer 4 (particles): OFF by default per RD-2; descriptor.options.particles=false -->
<!-- AC-10: SVG overlay uses position:absolute;inset:0 NOT viewBox/preserveAspectRatio -->
<!-- NOTE: This is a STANDALONE example — the full fd-engine is inlined here.       -->
<!--       In production, buildEngine(fdDir, 'flowchart') concatenates the modules. -->
<script>
(function(){
'use strict'

/* ── fd/core.js ── */

const NS = 'http://www.w3.org/2000/svg'
let canvas = null
let svgEl   = null
const nodeEl = {}

function init(){
  const data = JSON.parse(document.getElementById('fd-data').textContent)
  canvas = document.getElementById('fd-canvas')
  svgEl  = document.getElementById('fd-edges')
  canvas.style.height = (data.canvas && data.canvas.height ? data.canvas.height : 680) + 'px'

  // Render nodes with 'simple' card default (RD-3: flowchart = auto-layout type)
  renderNodes(data.nodes, 'simple')

  // Pixel-space positioning: x/y are in pixels from bun elk step (RD-1, layout='auto')
  positionFlowchartNodes(data.nodes)

  // Apply flowchart shape classes (diamond for decisions, pill for start/end)
  applyFlowchartShapes(data.nodes)

  // Draw DOM-measured bezier edges
  draw(data.edges)

  // ResizeObserver: redraw edges on resize (node positions static)
  new ResizeObserver(() => draw(data.edges)).observe(canvas)
}

// rect(): getBoundingClientRect relative to canvas (lyra-stack core technique)
function rect(id){
  const el = nodeEl[id]
  const cr = canvas.getBoundingClientRect()
  const b  = el.getBoundingClientRect()
  return { cx: b.left - cr.left + b.width / 2, cy: b.top - cr.top + b.height / 2, w: b.width, h: b.height }
}

function pairKey(a, b){ return [a, b].sort().join('|') }

function faceFor(dx, dy, isSource, edge){
  if(edge){
    if(isSource && edge.srcFace) return edge.srcFace
    if(!isSource && edge.dstFace) return edge.dstFace
  }
  if(Math.abs(dy) >= Math.abs(dx)){
    if(isSource) return dy > 0 ? 'bottom' : 'top'
    else         return dy > 0 ? 'top'    : 'bottom'
  } else {
    if(isSource) return dx > 0 ? 'right' : 'left'
    else         return dx > 0 ? 'left'  : 'right'
  }
}

function portAnchor(r, face, slotIdx, slotCount){
  const { cx, cy, w, h } = r
  const hw = w / 2, hh = h / 2
  const faceLen = (face === 'top' || face === 'bottom') ? w : h
  const spread  = Math.min(faceLen * 0.55, slotCount * 16)
  const step    = slotCount > 1 ? spread / (slotCount - 1) : 0
  const offset  = slotCount > 1 ? -spread / 2 + slotIdx * step : 0
  switch(face){
    case 'top':    return { x: cx + offset, y: cy - hh, nx:  0, ny: -1 }
    case 'bottom': return { x: cx + offset, y: cy + hh, nx:  0, ny:  1 }
    case 'left':   return { x: cx - hw,     y: cy + offset, nx: -1, ny:  0 }
    case 'right':  return { x: cx + hw,     y: cy + offset, nx:  1, ny:  0 }
    default:       return { x: cx, y: cy, nx: 0, ny: 0 }
  }
}

function stubLen(dx, dy){
  return Math.max(30, Math.min(220, Math.sqrt(dx * dx + dy * dy) * 0.35))
}

/* ── fd/cards.js (simple-box subset for flowchart) ── */

// renderNodes: append .fd-node divs with simple-box card structure (RD-3)
// typeDefault='simple' — flowchart auto-layout type uses simple cards
function renderNodes(nodes, typeDefault){
  for(const nd of nodes){
    const el = document.createElement('div')

    // Base class + kind class (for CSS kind-specific rules)
    let cls = 'fd-node'
    if(nd.kind) cls += ` fd-kind-${nd.kind}`
    el.className = cls
    el.dataset.id = nd.id

    // Card style: per-node override (node.cardStyle) OR typeDefault OR 'simple'
    const style = nd.cardStyle || typeDefault || 'simple'

    if(style === 'simple'){
      // Simple-box: title + optional subtitle (RD-3: flowchart default)
      const sub = nd.d ? `<div class="fd-sub">${nd.d}</div>` : ''
      el.innerHTML = `<div class="fd-title">${nd.n}</div>${sub}`
    } else {
      // Premium card: accent bar + title + subtitle (per-node override path)
      const sub = nd.d ? `<div class="fd-sub">${nd.d}</div>` : ''
      el.innerHTML = `<span class="fd-accent"></span><div class="fd-title">${nd.n}</div>${sub}`
    }

    canvas.appendChild(el)
    nodeEl[nd.id] = el
  }
}

/* ── fd/types/flowchart.js (pixel positioning + shape injection) ── */

// positionFlowchartNodes: apply elk-injected pixel x/y (RD-1, layout='auto')
// x/y are in pixels relative to canvas top-left; transform:translate(-50%,-50%) centers
function positionFlowchartNodes(nodes){
  for(const nd of nodes){
    const el = nodeEl[nd.id]
    if(!el) continue
    el.style.left = `${nd.x || 0}px`
    el.style.top  = `${nd.y || 0}px`
    el.style.removeProperty('--x')
    el.style.removeProperty('--y')
  }
}

// applyFlowchartShapes: inject fd-shape-diamond / fd-shape-pill after renderNodes()
function applyFlowchartShapes(nodes){
  for(const nd of nodes){
    const el = nodeEl[nd.id]
    if(!el) continue
    const kind  = nd.kind  || ''
    const shape = nd.shape || ''
    if(kind === 'diamond' || kind === 'decision' || kind === 'gate' || shape === 'diamond'){
      el.classList.add('fd-shape-diamond')
    } else if(kind === 'circle' || kind === 'terminal' || kind === 'start' || kind === 'end' || shape === 'pill'){
      el.classList.add('fd-shape-pill')
    }
  }
}

/* ── fd/edges.js ── */

let paths = []
const pathByPair = new Map()

function draw(edges){
  svgEl.querySelectorAll(':scope > path, :scope > text').forEach(n => n.remove())
  paths = []
  pathByPair.clear()

  // Step 1: deduplicate edges into canonical pairs
  const seenPairs = new Map()
  for(let i = 0; i < edges.length; i++){
    const e = edges[i]
    const k = pairKey(e.f, e.t)
    if(!seenPairs.has(k)){
      seenPairs.set(k, { f: e.f, t: e.t, plane: e.plane, lab: e.label || null, edge: e, edgeIndices: [i] })
    } else {
      seenPairs.get(k).edgeIndices.push(i)
      if(e.label && !seenPairs.get(k).lab) seenPairs.get(k).lab = e.label
    }
  }
  const dedupedEdges = [...seenPairs.values()]

  // Step 2: build port maps
  const portMap = new Map()
  for(let i = 0; i < dedupedEdges.length; i++){
    const { f, t, edge } = dedupedEdges[i]
    const rf = rect(f), rt = rect(t)
    const dx = rt.cx - rf.cx, dy = rt.cy - rf.cy
    const fFace = faceFor(dx, dy, true,  edge)
    const tFace = faceFor(dx, dy, false, edge)
    const fk = `${f}:${fFace}`, tk = `${t}:${tFace}`
    if(!portMap.has(fk)) portMap.set(fk, [])
    if(!portMap.has(tk)) portMap.set(tk, [])
    portMap.get(fk).push(i)
    portMap.get(tk).push(i)
  }

  // Step 3: draw one bezier path per deduped pair
  for(let i = 0; i < dedupedEdges.length; i++){
    const { f, t, plane, lab, edge } = dedupedEdges[i]
    const rf = rect(f), rt = rect(t)
    const dx = rt.cx - rf.cx, dy = rt.cy - rf.cy

    const fFace = faceFor(dx, dy, true,  edge)
    const tFace = faceFor(dx, dy, false, edge)
    const fk = `${f}:${fFace}`, tk = `${t}:${tFace}`

    const fSlots = portMap.get(fk)
    const tSlots = portMap.get(tk)
    const fi = fSlots.indexOf(i), ti = tSlots.indexOf(i)

    const pu1 = portAnchor(rf, fFace, fi, fSlots.length)
    const pu2 = portAnchor(rt, tFace, ti, tSlots.length)

    const stb = stubLen(dx, dy)
    const c1x = pu1.x + pu1.nx * stb, c1y = pu1.y + pu1.ny * stb
    const c2x = pu2.x + pu2.nx * stb, c2y = pu2.y + pu2.ny * stb

    const dStr = `M${pu1.x.toFixed(1)},${pu1.y.toFixed(1)} C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${pu2.x.toFixed(1)},${pu2.y.toFixed(1)}`

    const p = document.createElementNS(NS, 'path')
    p.setAttribute('d', dStr)
    p.setAttribute('class', plane || 'flow')
    p.setAttribute('marker-end', `url(#fd-arr-${plane || 'flow'})`)
    p.dataset.f  = f
    p.dataset.t  = t
    p.dataset.pk = pairKey(f, t)
    svgEl.appendChild(p)
    paths.push(p)
    pathByPair.set(pairKey(f, t), p)

    // Edge label (de Casteljau midpoint)
    if(lab){
      const tx = document.createElementNS(NS, 'text')
      const mx = 0.125 * pu1.x + 0.375 * c1x + 0.375 * c2x + 0.125 * pu2.x
      const my = 0.125 * pu1.y + 0.375 * c1y + 0.375 * c2y + 0.125 * pu2.y
      tx.setAttribute('x', mx.toFixed(1))
      tx.setAttribute('y', (my - 4).toFixed(1))
      tx.setAttribute('text-anchor', 'middle')
      tx.setAttribute('class', 'fd-elabel')
      tx.textContent = lab
      svgEl.appendChild(tx)
    }
  }
}

/* ── bootstrap ── */

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init)
} else {
  init()
}

}())
</script>
