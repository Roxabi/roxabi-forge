<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="GitHub issue lifecycle">
<meta name="diagram:date"      content="2026-04-15">
<meta name="diagram:category"  content="forge">
<meta name="diagram:cat-label" content="Forge · lifecycle">
<meta name="diagram:color"     content="green">
<!-- diagram-meta:end -->
<title>GitHub issue lifecycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10; --bg-panel: #11141a; --bg-card: #161a21;
    --border: #1f252e; --border-bright: #2b3340;
    --text: #e4e7ec; --text-dim: #9aa4b2; --text-muted: #6b7380;
    --amber: #fbbf24; --cyan: #22d3ee; --purple: #c084fc; --green: #4ade80; --red: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 32px 24px 40px; max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  .header-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  h1 { font-size: 28px; font-weight: 700; margin: 6px 0 4px; }
  h1 .accent { color: var(--green); }
  .header-subtitle { color: var(--text-dim); font-size: 13px; margin: 0; }

  .fgraph-wrap { position: relative; width: 100%; max-width: 820px; aspect-ratio: 16/10; margin: 0 auto 20px; background: var(--bg-panel); border: 1px solid rgba(74,222,128,0.35); border-radius: 10px; padding: 14px; }
  .fgraph-legend { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-family: 'Space Mono', monospace; font-size: 9.5px; color: var(--text-muted); pointer-events: none; }

  .fgraph-node { position: absolute; left: calc(var(--x, 50) * 1%); top: calc(var(--y, 50) * 1%); width: var(--w, 16%); transform: translate(-50%, -50%); background: var(--bg-card); border: 1.5px solid var(--border-bright); border-radius: 8px; padding: 6px 10px 7px; font-family: 'Inter', system-ui, sans-serif; color: var(--text); z-index: 2; }
  .fgraph-node.circle { border-radius: 50%; padding: 0; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 12px; }
  .fgraph-node.diamond { border-radius: 4px; transform: translate(-50%, -50%) rotate(45deg); text-align: center; }
  .fgraph-node.diamond > * { transform: rotate(-45deg); display: inline-block; }
  .fgraph-node.amber  { border-color: rgba(251,191,36,0.55); }
  .fgraph-node.cyan   { border-color: rgba(34,211,238,0.55); }
  .fgraph-node.purple { border-color: rgba(192,132,252,0.55); }
  .fgraph-node.green  { border-color: rgba(74,222,128,0.55); }
  .fgraph-node.red    { border-color: rgba(248,113,113,0.55); }
  .fgraph-title { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; text-align: center; }
  .fgraph-title.amber  { color: var(--amber); }
  .fgraph-title.cyan   { color: var(--cyan); }
  .fgraph-title.purple { color: var(--purple); }
  .fgraph-title.green  { color: var(--green); }
  .fgraph-sub { margin-top: 2px; font-family: 'Space Mono', monospace; font-size: 8.5px; color: var(--text-dim); text-align: center; }

  .fgraph-edges { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 1; }
  .fgraph-edges .mk-amber { fill: var(--amber); } .fgraph-edges .mk-cyan { fill: var(--cyan); } .fgraph-edges .mk-green { fill: var(--green); } .fgraph-edges .mk-red { fill: var(--red); }
  .fgraph-edges .fg-edge.amber  { stroke: var(--amber);  stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.cyan   { stroke: var(--cyan);   stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.green  { stroke: var(--green);  stroke-width: 1.5; fill: none; }
  .fgraph-edges .fg-edge.red    { stroke: var(--red);    stroke-width: 1.5; fill: none; }

  .fgraph-lbl { position: absolute; left: calc(var(--x, 50) * 1%); top: calc(var(--y, 50) * 1%); transform: translate(-50%, -50%); font-family: 'Space Mono', monospace; font-size: 9px; padding: 2px 6px; background: var(--bg-panel); border-radius: 3px; white-space: nowrap; z-index: 3; }
  .fgraph-lbl.amber { color: var(--amber); } .fgraph-lbl.cyan { color: var(--cyan); } .fgraph-lbl.green { color: var(--green); } .fgraph-lbl.red { color: var(--red); }
  .fgraph-lbl .dim { color: var(--text-muted); font-weight: 400; display: block; font-size: 8.5px; }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Forge · lifecycle</div>
  <h1>GitHub issue <span class="accent">lifecycle</span></h1>
  <p class="header-subtitle">backlog → todo → in-progress → in-review → done.</p>
</header>

<main>

<div class="fgraph-wrap" role="img"
     aria-label="State diagram of GitHub issue lifecycle. Start enters backlog; backlog transitions to todo on triage; todo to in-progress on /dev start; in-progress to in-review on PR open; in-review splits to done on merge or back to in-progress on changes requested.">

  <!-- ── EDGES ─────────────────────────────── -->
  <svg class="fgraph-edges" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="fg-arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-green"/></marker>
      <marker id="fg-arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-amber"/></marker>
      <marker id="fg-arr-cyan"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-cyan"/></marker>
      <marker id="fg-arr-red"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="mk-red"/></marker>
    </defs>
    <path class="fg-edge green" d="M 8,50 L 18,50" marker-end="url(#fg-arr-green)"/>
    <path class="fg-edge amber" d="M 32,50 L 45,50" marker-end="url(#fg-arr-amber)"/>
    <path class="fg-edge cyan"  d="M 55,50 L 68,50" marker-end="url(#fg-arr-cyan)"/>
    <path class="fg-edge cyan"  d="M 78,42 L 78,28" marker-end="url(#fg-arr-cyan)"/>
    <path class="fg-edge green" d="M 78,16 L 92,16 L 92,50" marker-end="url(#fg-arr-green)" fill="none"/>
    <path class="fg-edge red"   d="M 70,22 Q 54,22 54,40" marker-end="url(#fg-arr-red)" fill="none"/>
  </svg>

  <!-- ── LABELS ────────────────────────────── -->
  <div class="fgraph-lbl green" style="--x:13;--y:46;">new</div>
  <div class="fgraph-lbl amber" style="--x:38;--y:46;">triage</div>
  <div class="fgraph-lbl cyan"  style="--x:61;--y:46;">/dev</div>
  <div class="fgraph-lbl cyan"  style="--x:82;--y:36;">open PR</div>
  <div class="fgraph-lbl green" style="--x:85;--y:14;">merge<span class="dim">approved</span></div>
  <div class="fgraph-lbl red"   style="--x:58;--y:22;">changes<span class="dim">requested</span></div>

  <!-- ── STATES ────────────────────────────── -->
  <div class="fgraph-node green circle" style="--x:5;--y:50;--w:6%;">●</div>

  <div class="fgraph-node green" style="--x:25;--y:50;">
    <div class="fgraph-title green">backlog</div>
    <div class="fgraph-sub">priority TBD</div>
  </div>

  <div class="fgraph-node amber" style="--x:50;--y:50;">
    <div class="fgraph-title amber">todo</div>
    <div class="fgraph-sub">sized + prioritized</div>
  </div>

  <div class="fgraph-node cyan" style="--x:75;--y:50;">
    <div class="fgraph-title cyan">in-progress</div>
    <div class="fgraph-sub">worktree + branch</div>
  </div>

  <div class="fgraph-node amber diamond" style="--x:78;--y:20;--w:10%;">
    <div class="fgraph-title amber">in-review</div>
  </div>

  <div class="fgraph-node green circle" style="--x:95;--y:50;--w:6%;">◉</div>

  <div class="fgraph-legend">6 nodes · 6 transitions · red = rework loop · ● start ◉ end</div>
</div>

</main>

</body>
</html>
