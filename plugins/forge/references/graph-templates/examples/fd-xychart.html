<style>
/* ══ forge base reset (subset) ══ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
ul,ol{list-style:none;margin:0;padding:0}
button{cursor:pointer;font-family:inherit}

/* ══ lyra-v2 aesthetic tokens ══ */
:root{
  --bg:#0d1117;
  --bg-cell:#0f141a;
  --bg-panel:#13191f;
  --bg-card:#161b22;
  --surface:#13191f;
  --border:#21262d;
  --border-hi:#30363d;
  --text:#fafafa;
  --text-muted:#8b93a1;
  --text-dim:#6b7280;
  --accent:#e85d04;
  --amber:#f59e0b;
  --green:#10b981;
  --cyan:#22d3ee;
  --purple:#c084fc;
  --plum:#a855f7;
  --red:#ef4444;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;

  /* ── fd-engine plane defaults (AC-6: edge colors from aesthetic tokens) ── */
  --fd-plane-control:  #38bdf8;
  --fd-plane-write:    #34d399;
  --fd-plane-read:     #64748b;
  --fd-plane-data:     #a78bfa;
  --fd-plane-async:    #fb923c;
  --fd-plane-feedback: #fb7185;
  --fd-plane-message:  #38bdf8;
  --fd-plane-media:    #fbbf24;
  --fd-plane-llm:      #a78bfa;

  /* ── xychart-specific color palette (can be overridden per aesthetic) ── */
  --fd-xy-c0: var(--fd-plane-control,  #38bdf8);
  --fd-xy-c1: var(--fd-plane-async,    #fb923c);
  --fd-xy-c2: var(--fd-plane-write,    #34d399);
  --fd-xy-c3: var(--fd-plane-data,     #a78bfa);
  --fd-xy-c4: var(--fd-plane-feedback, #fb7185);
  --fd-xy-c5: var(--fd-plane-media,    #fbbf24);

  /* ── xychart element tokens ── */
  --fd-xy-grid:  rgba(255,255,255,0.07);
  --fd-xy-axis:  rgba(255,255,255,0.18);
  --fd-xy-label: #8b93a1;

  --fd-canvas-h: 420px;
}

/* ══ page shell ══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
.page{padding:22px 22px 60px;max-width:1100px;margin:0 auto}

/* ══ header ══ */
header{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;justify-content:space-between;
  padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.htitle h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
.htitle h1 b{color:var(--cyan)}
.htitle p{margin:5px 0 0;color:var(--text-muted);font-size:12px;font-family:var(--mono)}
.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-hi);color:var(--text-muted)}
.badge.cyan{border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.06);color:var(--cyan)}
.badge.amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--amber)}

/* ══ tab bar ══ */
.tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{cursor:pointer;font-size:11px;font-family:var(--mono);color:var(--text-muted);
  background:var(--bg-panel);border:1px solid var(--border-hi);border-radius:7px;padding:5px 12px;transition:.15s;user-select:none}
.tab:hover{border-color:var(--cyan);color:var(--text)}
.tab.active{background:rgba(34,211,238,.06);border-color:rgba(34,211,238,.4);color:var(--cyan)}

/* ══ chart wrapper ══ */
.chart-wrap{border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-cell));overflow:hidden;margin-bottom:22px}

/* ══ fd-engine canvas: positioning root ══ */
/* AC-10: .fd-canvas uses position:relative; no SVG viewBox stretch */
.fd-canvas{
  position:relative;
  width:100%;
  height:var(--fd-canvas-h,420px);
}

/* fd-xy-svg: fills the canvas, no node/edge overlay needed for xychart */
.fd-xy-svg{
  display:block;
  width:100%;
  height:100%;
  overflow:visible;
}
</style>

<!-- fd-engine inline bundle: xychart type only (layers 1-3 skipped, pure SVG math)
     AC-4: no fetch — all assets inline.  AC-5: single file.
     AC-10: no viewBox / preserveAspectRatio on any SVG element (xychart SVG is standalone). -->
<script>
(function(){
'use strict'

/* ── fd/core.js ── */
// Minimal core for xychart: only canvas ref needed (no nodeEl, no edges)
var canvas = null
var DESCRIPTOR = null

/* biome-ignore lint/correctness/noUnusedVariables: used by xychart.js via concat scope */
function initEngine(descriptor, canvasEl) {
  DESCRIPTOR = descriptor
  canvas = canvasEl
  if (descriptor.canvas && descriptor.canvas.height) {
    canvasEl.style.setProperty('--fd-canvas-h', descriptor.canvas.height + 'px')
  }
}

/* ── fd/types/xychart.js ── */

const TYPE = 'xychart'

const XY_PALETTE = [
  'var(--fd-xy-c0, var(--fd-plane-control,  #38bdf8))',
  'var(--fd-xy-c1, var(--fd-plane-async,    #fb923c))',
  'var(--fd-xy-c2, var(--fd-plane-write,    #34d399))',
  'var(--fd-xy-c3, var(--fd-plane-data,     #a78bfa))',
  'var(--fd-xy-c4, var(--fd-plane-feedback, #fb7185))',
  'var(--fd-xy-c5, var(--fd-plane-media,    #fbbf24))',
]

const PAD_L = 62
const PAD_R = 24
const PAD_T = 28
const PAD_B = 54
const BAR_PAD = 6
const BAR_GAP = 4
const LINE_SW  = 2.5
const DOT_R    = 4
const XY_NS = 'http://www.w3.org/2000/svg'

function svgEl(tag, attrs) {
  const el = document.createElementNS(XY_NS, tag)
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v)
  return el
}

function niceMax(rawMax, nTicks) {
  if (rawMax <= 0) return nTicks
  const rawStep = rawMax / nTicks
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)))
  const niceStep = Math.ceil(rawStep / magnitude) * magnitude
  return niceStep * nTicks
}

function fmtTick(v) {
  if (Number.isInteger(v)) return String(v)
  return v.toFixed(1)
}

function renderXychart(descriptor) {
  const existing = canvas.querySelector('.fd-xy-svg')
  if (existing) existing.remove()

  const chart = descriptor.chart || {}
  const categories = descriptor.categories || []
  const series = chart.series || []
  const N = categories.length

  if (N === 0 || series.length === 0) {
    const placeholder = svgEl('svg', { class: 'fd-xy-svg', width: '100%', height: '100%' })
    const msg = svgEl('text', { x: '50%', y: '50%', 'text-anchor': 'middle', fill: '#8b93a1', 'font-size': '14' })
    msg.textContent = 'No data'
    placeholder.appendChild(msg)
    canvas.appendChild(placeholder)
    return
  }

  const canvasCfg = descriptor.canvas || {}
  const chartW = canvasCfg.width  || canvas.offsetWidth  || 820
  const chartH = canvasCfg.height || canvas.offsetHeight || 400

  const allValues = series.flatMap((s) => s.values || []).filter((v) => typeof v === 'number')
  const rawMax = allValues.length > 0 ? Math.max(...allValues) : 100
  const rawMin = allValues.length > 0 ? Math.min(...allValues) : 0

  const nGridLines = typeof chart.gridLines === 'number' ? chart.gridLines : 5
  const yMinCfg = typeof chart.yMin === 'number' ? chart.yMin : Math.min(0, rawMin)
  const yMaxCfg = typeof chart.yMax === 'number' ? chart.yMax : niceMax(rawMax - yMinCfg, nGridLines) + yMinCfg

  const yMin = yMinCfg
  const yMax = yMaxCfg
  const yRange = yMax - yMin || 1

  // Plot area geometry
  const plotW = chartW - PAD_L - PAD_R
  const plotH = chartH - PAD_T  - PAD_B

  // catStep: width of one category slot
  const catStep = plotW / N

  // catX(i): SVG x at center of slot i
  // MATH: PAD_L + i*catStep + catStep/2
  // i=0 → PAD_L + catStep/2  ✓ (first slot center)
  // i=N-1 → PAD_L + (N-1)*catStep + catStep/2 = PAD_L + plotW - catStep/2  ✓ (last slot center)
  const catX = (i) => PAD_L + i * catStep + catStep / 2

  // scaleY(v): SVG y for data value v
  // MATH: PAD_T + plotH*(1-(v-yMin)/yRange)
  // v=yMin → PAD_T + plotH  ✓ (baseline)
  // v=yMax → PAD_T          ✓ (top of plot)
  const scaleY = (v) => PAD_T + plotH * (1 - (v - yMin) / yRange)

  // barH(v): bar height in SVG pixels
  // MATH: plotH*(v-yMin)/yRange  → scaleY(v) + barH(v) = PAD_T + plotH ✓ (sits on baseline)
  const barH = (v) => plotH * Math.max(0, (v - yMin) / yRange)

  const barSeries = series.filter((s) => (s.type || 'bar') === 'bar')
  const nBarSeries = barSeries.length
  const barGroupW = catStep - 2 * BAR_PAD
  const singleBarW = nBarSeries > 0
    ? Math.max(2, (barGroupW - (nBarSeries - 1) * BAR_GAP) / nBarSeries)
    : barGroupW

  // barX(i, si): left edge of bar si (0-indexed among bar series) in slot i
  // MATH: PAD_L + i*catStep + BAR_PAD + si*(singleBarW + BAR_GAP)
  const barGroupLeft = (i) => PAD_L + i * catStep + BAR_PAD
  const barX = (i, si) => barGroupLeft(i) + si * (singleBarW + BAR_GAP)

  const svg = svgEl('svg', {
    class: 'fd-xy-svg',
    width: chartW,
    height: chartH,
    'aria-label': descriptor.title || 'XY chart',
    role: 'img',
  })

  // Injected CSS (AC-6: colors from aesthetic tokens)
  const style = document.createElementNS(XY_NS, 'style')
  style.textContent = [
    '.fd-xy-grid line{stroke:var(--fd-xy-grid,rgba(255,255,255,.07));stroke-dasharray:4 3}',
    '.fd-xy-axis line,.fd-xy-axis path{stroke:var(--fd-xy-axis,rgba(255,255,255,.18));fill:none}',
    '.fd-xy-tick-label{font-family:var(--mono,monospace);font-size:10px;fill:var(--fd-xy-label,#8b93a1)}',
    '.fd-xy-axis-title{font-family:var(--sans,sans-serif);font-size:11px;fill:var(--fd-xy-label,#8b93a1)}',
    '.fd-xy-chart-title{font-family:var(--sans,sans-serif);font-size:14px;font-weight:700;fill:var(--text,#fafafa)}',
    '.fd-xy-legend{font-family:var(--mono,monospace);font-size:10px;fill:var(--fd-xy-label,#8b93a1)}',
    '.fd-xy-bar{opacity:.82;transition:opacity .12s}',
    '.fd-xy-bar:hover{opacity:1}',
    '.fd-xy-line{fill:none;stroke-width:' + LINE_SW + ';opacity:.9}',
    '.fd-xy-dot{opacity:.9}',
  ].join('\n')
  svg.appendChild(style)

  // Chart title
  if (descriptor.title) {
    const titleEl = svgEl('text', {
      class: 'fd-xy-chart-title',
      x: PAD_L + plotW / 2,
      y: 18,
      'text-anchor': 'middle',
    })
    titleEl.textContent = descriptor.title
    svg.appendChild(titleEl)
  }

  // Y-axis grid lines + tick labels
  const gridG = svgEl('g', { class: 'fd-xy-grid', 'aria-hidden': 'true' })
  const yTickG = svgEl('g', { 'aria-hidden': 'true' })

  for (let ti = 0; ti <= nGridLines; ti++) {
    // MATH: yVal = yMin + yRange*(ti/nGridLines)
    // ti=0 → yMin (bottom), ti=nGridLines → yMax (top)  ✓
    const yVal = yMin + yRange * (ti / nGridLines)
    const yPx  = scaleY(yVal)

    gridG.appendChild(svgEl('line', { x1: PAD_L, y1: yPx, x2: PAD_L + plotW, y2: yPx }))

    const lbl = svgEl('text', {
      class: 'fd-xy-tick-label',
      x: PAD_L - 8,
      y: yPx + 4,
      'text-anchor': 'end',
    })
    lbl.textContent = fmtTick(yVal)
    yTickG.appendChild(lbl)
  }

  svg.appendChild(gridG)

  // Axes (L-shape)
  const axisG = svgEl('g', { class: 'fd-xy-axis', 'aria-hidden': 'true' })
  axisG.appendChild(svgEl('line', { x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: PAD_T + plotH }))
  axisG.appendChild(svgEl('line', { x1: PAD_L, y1: PAD_T + plotH, x2: PAD_L + plotW, y2: PAD_T + plotH }))
  svg.appendChild(axisG)
  svg.appendChild(yTickG)

  // X-axis ticks + category labels
  const xLabelG = svgEl('g', { 'aria-hidden': 'true' })
  for (let i = 0; i < N; i++) {
    const cx = catX(i)
    xLabelG.appendChild(svgEl('line', {
      class: 'fd-xy-axis',
      x1: cx, y1: PAD_T + plotH, x2: cx, y2: PAD_T + plotH + 5,
      stroke: 'var(--fd-xy-axis, rgba(255,255,255,.18))',
    }))
    const lbl = svgEl('text', {
      class: 'fd-xy-tick-label',
      x: cx, y: PAD_T + plotH + 16,
      'text-anchor': 'middle',
    })
    lbl.textContent = categories[i] || ''
    xLabelG.appendChild(lbl)
  }
  svg.appendChild(xLabelG)

  // Axis titles
  if (chart.xTitle) {
    const el = svgEl('text', {
      class: 'fd-xy-axis-title',
      x: PAD_L + plotW / 2,
      y: chartH - 4,
      'text-anchor': 'middle',
    })
    el.textContent = chart.xTitle
    svg.appendChild(el)
  }

  if (chart.yTitle) {
    const el = svgEl('text', {
      class: 'fd-xy-axis-title',
      x: 0, y: 0,
      'text-anchor': 'middle',
      transform: `rotate(-90) translate(${-(PAD_T + plotH / 2)}, ${14})`,
    })
    el.textContent = chart.yTitle
    svg.appendChild(el)
  }

  // Bar series
  let barSeriesIdx = 0
  for (const s of series) {
    if ((s.type || 'bar') !== 'bar') continue
    const color = s.color || XY_PALETTE[series.indexOf(s) % XY_PALETTE.length]
    const si = barSeriesIdx
    const barG = svgEl('g', {
      class: 'fd-xy-bar',
      'aria-label': s.name || ('Series ' + (si + 1)),
      style: 'fill: ' + color,
    })

    for (let i = 0; i < N; i++) {
      const v = (s.values || [])[i]
      if (typeof v !== 'number') continue
      // MATH bar: x=barX(i,si), y=scaleY(v), w=singleBarW, h=barH(v)
      // Verification: y + h = scaleY(v) + barH(v) = PAD_T + plotH  ✓ (baseline)
      barG.appendChild(svgEl('rect', {
        x: barX(i, si).toFixed(2),
        y: scaleY(v).toFixed(2),
        width: singleBarW.toFixed(2),
        height: barH(v).toFixed(2),
        rx: 2,
      }))
    }

    svg.appendChild(barG)
    barSeriesIdx++
  }

  // Line series
  for (const s of series) {
    if ((s.type || 'bar') !== 'line') continue
    const color = s.color || XY_PALETTE[series.indexOf(s) % XY_PALETTE.length]

    // MATH: points = catX(i),scaleY(v[i])  ✓ (center of slot, proportional y)
    const points = (s.values || [])
      .map((v, i) => typeof v === 'number' ? catX(i).toFixed(2) + ',' + scaleY(v).toFixed(2) : null)
      .filter(Boolean)
      .join(' ')

    if (!points) continue

    svg.appendChild(svgEl('polyline', {
      class: 'fd-xy-line',
      points,
      stroke: color,
    }))

    // Dots
    const dotG = svgEl('g', { class: 'fd-xy-dot', style: 'fill: ' + color })
    ;(s.values || []).forEach((v, i) => {
      if (typeof v !== 'number') return
      dotG.appendChild(svgEl('circle', {
        cx: catX(i).toFixed(2),
        cy: scaleY(v).toFixed(2),
        r: DOT_R,
      }))
    })
    svg.appendChild(dotG)
  }

  // Legend
  const legendItems = series.filter((s) => s.name)
  if (legendItems.length > 0) {
    const legendG = svgEl('g', { class: 'fd-xy-legend', 'aria-label': 'Legend' })
    const legendY = chartH - (chart.xTitle ? 22 : 10)
    const itemW   = 90
    const totalW  = legendItems.length * itemW
    const startX  = PAD_L + (plotW - totalW) / 2

    legendItems.forEach((s, li) => {
      const color = s.color || XY_PALETTE[series.indexOf(s) % XY_PALETTE.length]
      const lx = startX + li * itemW
      const sType = s.type || 'bar'

      if (sType === 'bar') {
        legendG.appendChild(svgEl('rect', {
          x: lx, y: legendY - 8, width: 12, height: 10, rx: 2,
          style: 'fill: ' + color + '; opacity: 0.82',
        }))
      } else {
        legendG.appendChild(svgEl('line', {
          x1: lx, y1: legendY - 3, x2: lx + 12, y2: legendY - 3,
          stroke: color, 'stroke-width': LINE_SW,
        }))
        legendG.appendChild(svgEl('circle', {
          cx: lx + 6, cy: legendY - 3, r: 3,
          style: 'fill: ' + color,
        }))
      }

      const lbl = svgEl('text', {
        class: 'fd-xy-legend',
        x: lx + 16, y: legendY,
        'text-anchor': 'start',
      })
      lbl.textContent = s.name
      legendG.appendChild(lbl)
    })

    svg.appendChild(legendG)
  }

  canvas.appendChild(svg)
}

function init(descriptor) {
  renderXychart(descriptor)
  new ResizeObserver(() => renderXychart(descriptor)).observe(canvas)
  return { typeDefault: null }
}

window.__fdTypes = window.__fdTypes || {}
window.__fdTypes[TYPE] = { init }

/* ── bootstrap ── */
var ACTIVE_DESCRIPTOR = null

function loadDescriptor(id) {
  const raw = document.getElementById(id)
  if (!raw) return null
  try { return JSON.parse(raw.textContent) } catch(e) { console.error('[fd-xychart] parse error', e); return null }
}

function renderTab(tabKey) {
  const desc = loadDescriptor('fd-data-' + tabKey)
  if (!desc) return
  ACTIVE_DESCRIPTOR = desc
  canvas = document.getElementById('fd-canvas')
  initEngine(desc, canvas)
  window.__fdTypes.xychart.init(desc)
}

function bootstrap() {
  canvas = document.getElementById('fd-canvas')

  // Tab switching
  document.querySelectorAll('.tab[data-tab]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab[data-tab]').forEach((b) => b.classList.remove('active'))
      btn.classList.add('active')
      renderTab(btn.dataset.tab)
    })
  })

  // Initial render: bar tab
  renderTab('bar')
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootstrap)
} else {
  bootstrap()
}

}())
</script>
