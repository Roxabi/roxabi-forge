*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
ul,ol{list-style:none;margin:0;padding:0}

/* ══ lyra-v2 aesthetic tokens ══ */
:root{
  --bg:#0d1117;
  --bg-cell:#0f141a;
  --bg-panel:#13191f;
  --bg-card:#161b22;
  --border:#21262d;
  --border-hi:#30363d;
  --text:#fafafa;
  --text-muted:#8b93a1;
  --text-dim:#6b7280;
  --accent:#e85d04;
  --teal:#06b6d4;

  --green:#10b981;

  --purple:#c084fc;
  --plum:#a855f7;
  --red:#ef4444;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;

/* ══ page shell ══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
.page{padding:22px 22px 60px;max-width:1200px;margin:0 auto}

/* ══ header ══ */
header{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;justify-content:space-between;
  padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.htitle h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
.htitle h1 b{color:var(--cyan)}
.htitle p{margin:5px 0 0;color:var(--text-muted);font-size:12px;font-family:var(--mono)}
.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-hi);color:var(--text-muted)}
.badge.cyan{border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.06);color:var(--cyan)}
.badge.amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--amber)}

/* ══ stage ══ */
.stage-wrap{border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-cell));
  padding:16px;overflow:auto;margin-bottom:22px}

/* ══ fd-engine canvas ══ */
/* fd-canvas: positioning root for gantt bars and axis */
.fd-canvas{position:relative;width:100%}

/* ══ gantt primitives (from fgraph-base.css contract) ══ */
/* .fg-gantt-bar: uses --x and --w CSS custom properties for positioning */
.fg-gantt-bar{
  position:absolute;
  left:calc(var(--x, 0) * 1%);
  top:0; /* overridden inline by JS */
  width:calc(var(--w, 10) * 1%);
  height:24px;
  padding:0 8px;
  background:var(--bg-card);
  border:1px solid var(--border-hi);
  border-radius:4px;
  font-family:var(--mono);
  font-size:9px;
  line-height:24px;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:default;
  transition:opacity .15s;
}
.fg-gantt-bar:hover{opacity:.8}
.fg-gantt-bar.amber {border-color:rgba(245,158,11,.55); background:rgba(245,158,11,.10); color:var(--amber)}
.fg-gantt-bar.cyan  {border-color:rgba(34,211,238,.55); background:rgba(34,211,238,.10); color:var(--cyan)}
.fg-gantt-bar.purple{border-color:rgba(192,132,252,.55);background:rgba(192,132,252,.10);color:var(--purple)}
.fg-gantt-bar.green {border-color:rgba(16,185,129,.55); background:rgba(16,185,129,.10); color:var(--green)}
.fg-gantt-bar.red   {border-color:rgba(239,68,68,.55);  background:rgba(239,68,68,.10);  color:var(--red)}
.fg-gantt-bar.plum  {border-color:rgba(168,85,247,.55); background:rgba(168,85,247,.10); color:var(--plum)}

/* section label */
.fg-gantt-section-lbl{
  position:absolute;
  font-family:var(--mono);
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:.06em;
  text-transform:uppercase;
  pointer-events:none;
}

/* date axis */
.fg-gantt-axis{position:absolute}
.fg-axis-date-baseline{position:absolute;left:0;right:0;top:0;height:1px;background:var(--border-hi)}
.fg-axis-date-tick{position:absolute;top:0;transform:translateX(-50%);width:1px;height:5px;background:var(--border-hi)}
.fg-axis-date-label{position:absolute;top:7px;transform:translateX(-50%);font-family:var(--mono);font-size:8px;color:var(--text-dim);white-space:nowrap}
</style>

<!-- fd-engine inline bundle: gantt type module only (no edge engine needed) -->
<!-- AC-4: no fetch | AC-5: single file | AC-10: no SVG overlay for gantt -->
<script>
(function(){
'use strict'

/* ── fd/core.js (subset needed by gantt: canvas ref only) ── */

var canvas = null

/* ── fd/types/gantt.js ── */

var GANTT_TYPE = 'gantt'
var GANTT_CARD_DEFAULT = null

function ganttDaysSince(isoDate, startMs) {
  return (Date.parse(isoDate) - startMs) / 86400000
}

function barX(barStart, timelineStartMs, totalDays) {
  var raw = (ganttDaysSince(barStart, timelineStartMs) / totalDays) * 100
  return Math.max(0, Math.min(100, raw))
}

function barW(barStart, barEnd, timelineStartMs, totalDays) {
  var startPct = (ganttDaysSince(barStart, timelineStartMs) / totalDays) * 100
  var endPct   = (ganttDaysSince(barEnd,   timelineStartMs) / totalDays) * 100
  // RC (F1): min(endPct,100) − max(startPct,0); avoids double-width when startPct < 0.
  return Math.max(0, Math.min(100, endPct) - Math.max(0, startPct))
}

function ganttTicks(timelineStart, timelineEnd, totalDays) {
  var ticks = []
  var startMs = Date.parse(timelineStart)
  var d = new Date(Date.parse(timelineStart))
  d.setUTCDate(1)
  d.setUTCMonth(d.getUTCMonth() + 1)
  var endMs = Date.parse(timelineEnd)
  var MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  while(d.getTime() <= endMs){
    var pct = ((d.getTime() - startMs) / 86400000 / totalDays) * 100
    ticks.push({ label: MONTH_ABBR[d.getUTCMonth()], x: pct })
    d.setUTCMonth(d.getUTCMonth() + 1)
  }
  return ticks
}

function renderGantt(descriptor){
  var timeline = descriptor.timeline || {}
  var sections = descriptor.sections || []
  var opts = descriptor.options || {}

  var timelineStart   = timeline.start || '2026-01-01'
  var timelineEnd     = timeline.end   || '2026-12-31'
  var timelineStartMs = Date.parse(timelineStart)
  var totalDays       = (Date.parse(timelineEnd) - timelineStartMs) / 86400000

  if(totalDays <= 0){
    console.warn('[fd/gantt] invalid timeline: totalDays =', totalDays)
    return
  }

  var ROW_H         = 28
  var SECTION_H     = 22
  var BAR_GUTTER    = 4
  var CHART_LEFT_PCT = 12
  var AXIS_H        = 30
  var TOP_PAD       = 10

  // compute total height
  var rowCount = 0
  for(var s = 0; s < sections.length; s++){
    rowCount += 1
    rowCount += (sections[s].bars || []).length
  }
  var chartH = TOP_PAD + rowCount * (ROW_H + BAR_GUTTER) + AXIS_H + 20

  canvas.style.height = chartH + 'px'

  var yPx = TOP_PAD
  var chartW = 100 - CHART_LEFT_PCT

  for(var si = 0; si < sections.length; si++){
    var sec = sections[si]
    if(sec.title){
      var lbl = document.createElement('div')
      lbl.className = 'fg-gantt-section-lbl'
      lbl.textContent = sec.title
      lbl.style.top  = (yPx + 4) + 'px'
      lbl.style.left = '1%'
      canvas.appendChild(lbl)
      yPx += SECTION_H
    }

    var bars = sec.bars || []
    for(var bi = 0; bi < bars.length; bi++){
      var bar = bars[bi]
      var x = barX(bar.start, timelineStartMs, totalDays)
      var w = barW(bar.start, bar.end, timelineStartMs, totalDays)

      // remap to chart lane: [CHART_LEFT_PCT .. 100%]
      var finalX = CHART_LEFT_PCT + x * (chartW / 100)
      var finalW = w * (chartW / 100)

      var el = document.createElement('div')
      el.className = 'fg-gantt-bar' + (bar.color ? ' ' + bar.color : '')
      el.id = bar.id || ''
      el.textContent = bar.label || ''
      el.title = (bar.label || '') + ': ' + bar.start + ' → ' + bar.end

      el.style.setProperty('--x', finalX.toFixed(2))
      el.style.setProperty('--w', finalW.toFixed(2))
      el.style.top = yPx + 'px'
      el.style.height = (ROW_H - 4) + 'px'
      el.style.lineHeight = (ROW_H - 4) + 'px'

      canvas.appendChild(el)
      yPx += ROW_H + BAR_GUTTER
    }
  }

  // date axis
  var axis = document.createElement('div')
  axis.className = 'fg-gantt-axis'
  axis.style.cssText = 'position:absolute;left:' + CHART_LEFT_PCT + '%;right:0;top:' + yPx + 'px;height:' + AXIS_H + 'px'

  var baseline = document.createElement('div')
  baseline.className = 'fg-axis-date-baseline'
  axis.appendChild(baseline)

  var ticks = ganttTicks(timelineStart, timelineEnd, totalDays)
  for(var ti = 0; ti < ticks.length; ti++){
    var tick = ticks[ti]
    // RC (F2/F10): tick.x is already in 0..100% of the chart lane coordinate space.
    // The axis div spans left:12%;right:0 — children are positioned relative to it.
    // Using tick.x directly aligns ticks with bar positions. The old tick.x*(chartW/100)
    // applied a second ×0.88 factor, shifting labels ~7% left of bar boundaries.

    var tickEl = document.createElement('div')
    tickEl.className = 'fg-axis-date-tick'
    tickEl.style.left = tick.x.toFixed(2) + '%'
    axis.appendChild(tickEl)

    var lblEl = document.createElement('div')
    lblEl.className = 'fg-axis-date-label'
    lblEl.style.left = tick.x.toFixed(2) + '%'
    lblEl.textContent = tick.label
    axis.appendChild(lblEl)
  }
  canvas.appendChild(axis)

  // today marker
  if(opts.showToday){
    var todayMs = Date.now()
    if(todayMs > timelineStartMs && todayMs < Date.parse(timelineEnd)){
      var todayPct  = ((todayMs - timelineStartMs) / 86400000 / totalDays) * 100
      var finalTodayX = CHART_LEFT_PCT + todayPct * (chartW / 100)
      var todayLine = document.createElement('div')
      todayLine.className = 'fg-gantt-today'
      todayLine.style.cssText = 'position:absolute;left:' + finalTodayX.toFixed(2) + '%;top:0;bottom:0;width:1px;background:rgba(239,68,68,0.55);pointer-events:none;z-index:3'
      var todayLbl = document.createElement('span')
      todayLbl.textContent = 'today'
      todayLbl.style.cssText = 'position:absolute;top:2px;left:3px;font-size:8px;font-family:var(--mono,monospace);color:rgba(239,68,68,0.7);white-space:nowrap'
      todayLine.appendChild(todayLbl)
      canvas.appendChild(todayLine)
    }
  }
}

/* ── bootstrap ── */

function init(){
  var data = JSON.parse(document.getElementById('fd-data').textContent)
  canvas = document.getElementById('fd-canvas')
  renderGantt(data)
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init)
} else {
  init()
}

}())
</script>
</body>
