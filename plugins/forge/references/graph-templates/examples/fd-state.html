<head>

<!-- Google Fonts — degrades gracefully offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ══ forge base reset ══ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
ul,ol{list-style:none;margin:0;padding:0}
button{cursor:pointer;font-family:inherit}

/* ══ lyra-v2 aesthetic tokens ══ */
:root{
  --bg:#0d1117;
  --bg-cell:#0f141a;
  --bg-panel:#13191f;
  --bg-card:#161b22;
  --surface:#13191f;
  --surface2:#161b22;
  --border:#21262d;
  --border-hi:#30363d;
  --border-bright:#30363d;
  --text:#fafafa;
  --text-muted:#8b93a1;
  --text-dim:#6b7280;
  --accent:#e85d04;
  --accent-2:#f97316;
  --accent-dim:rgba(232,93,4,0.12);
  --teal:#06b6d4;
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,0.10);
  --green:#10b981;
  --cyan:#22d3ee;
  --purple:#c084fc;
  --plum:#a855f7;
  --red:#ef4444;
  --amber-glow:rgba(245,158,11,0.22);
  --cyan-glow:rgba(34,211,238,0.22);
  --purple-glow:rgba(192,132,252,0.22);
  --green-glow:rgba(16,185,129,0.22);
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
}

/* ══ fd-engine plane vars (mapped to lyra-v2 palette) ══ */
:root{
  --fd-plane-control:#22d3ee;
  --fd-plane-write:#10b981;
  --fd-plane-read:#c084fc;
  --fd-plane-data:#a855f7;
  --fd-plane-async:#f59e0b;
  --fd-plane-feedback:#e85d04;
  --fd-plane-message:#22d3ee;
  --fd-canvas-h:680px;
}

/* ══ page shell ══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.4}
.page{padding:22px 22px 60px;max-width:860px;margin:0 auto}

/* ══ header ══ */
header{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px;justify-content:space-between;
  padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.htitle h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
.htitle h1 b{color:var(--cyan)}
.htitle p{margin:5px 0 0;color:var(--text-muted);font-size:11.5px;font-family:var(--mono)}
.badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-hi);color:var(--text-muted)}
.badge.cyan{border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.06);color:var(--cyan)}
.badge.amber{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--amber)}

/* ══ diagram container ══ */
.stage-wrap{position:relative;border:1px solid var(--border);border-radius:12px;
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-cell));overflow:auto;margin-bottom:22px}
.stage-wrap::-webkit-scrollbar{height:8px;width:8px}
.stage-wrap::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:8px}

/* ══ fd-engine canvas ══ */
.fd-canvas{position:relative;width:100%;height:var(--fd-canvas-h,680px)}
/* fd-edges SVG overlay: pixel space, NO preserveAspectRatio (AC-10) */
.fd-edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
.fd-edges path{fill:none;stroke-width:1.8;opacity:.65;transition:opacity .15s,stroke-width .15s}
/* semantic planes */
.fd-edges path.control {stroke:var(--fd-plane-control)}
.fd-edges path.write   {stroke:var(--fd-plane-write)}
.fd-edges path.feedback{stroke:var(--fd-plane-feedback)}
.fd-edges path.async   {stroke:var(--fd-plane-async)}
.fd-edges path.hot{opacity:1;stroke-width:2.8}
/* dashed edges for internal/self-transitions (state.js edge.style='dashed') */
.fd-edges path.fd-edge-dashed{stroke-dasharray:5 3;opacity:.5}
.fd-canvas.dimmed .fd-edges path:not(.hot){opacity:.06}
/* edge label */
.fd-edges .fd-elabel{font-family:var(--mono);font-size:9px;fill:var(--text-muted);opacity:0}
.fd-edges .fd-elabel.hot{opacity:1}
/* guard label for state transitions — shown inline via fd-guard-label class */
.fd-edges .fd-guard-label{font-family:var(--mono);font-size:8.5px;fill:var(--amber);opacity:.8}

/* ══ fd-node base ══ */
.fd-node{
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:2;
  cursor:default;
  transition:box-shadow .15s,border-color .15s
}
/* ── State box (default) ── */
.fd-node.fd-state-box{
  background:linear-gradient(180deg,var(--bg-panel),var(--bg-card));
  border:1px solid var(--border-hi);
  border-radius:8px;
  padding:6px 14px;
  font-family:var(--mono);
  font-size:11.5px;
  font-weight:600;
  white-space:nowrap;
  width:120px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.4)
}
.fd-node.fd-state-box:hover{border-color:var(--border-bright);box-shadow:0 5px 18px rgba(0,0,0,.6)}
.fd-node.fd-state-box.hot{border-color:rgba(255,255,255,.2);box-shadow:0 0 0 1px rgba(255,255,255,.1),0 6px 22px rgba(0,0,0,.65)}
.fd-canvas.dimmed .fd-node.fd-state-box:not(.hot){opacity:.22}
.fd-node.fd-state-box .fd-sub{font-size:9px;color:var(--text-dim);margin-top:3px;font-weight:400}

/* ── Circle node (start / end) ── */
.fd-node.fd-shape-circle{
  width:32px;height:32px;
  border-radius:50%;
  background:var(--text);
  display:flex;align-items:center;justify-content:center
}
.fd-node.fd-state-start{
  background:var(--text);
  box-shadow:0 0 8px rgba(255,255,255,.15)
}
.fd-node.fd-state-end{
  background:transparent;
  border:3px solid var(--text);
  box-shadow:0 0 8px rgba(255,255,255,.15)
}
.fd-state-end-inner{
  display:block;
  width:18px;height:18px;
  border-radius:50%;
  background:var(--text)
}
.fd-canvas.dimmed .fd-node.fd-shape-circle:not(.hot){opacity:.22}

/* ── Diamond node (choice / fork) ── */
.fd-node.fd-shape-diamond{
  width:56px;height:56px;
  background:var(--bg-card);
  border:1px solid var(--border-hi);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center
}
.fd-node.fd-shape-diamond:hover{border-color:var(--border-bright)}
.fd-node.fd-shape-diamond.hot{border-color:rgba(255,255,255,.2)}
.fd-state-diamond-label{
  transform:rotate(-45deg);
  font-family:var(--mono);
  font-size:8.5px;
  color:var(--text-muted);
  text-align:center;
  white-space:nowrap
}
.fd-canvas.dimmed .fd-node.fd-shape-diamond:not(.hot){opacity:.22}
</style>
</head>

<!-- fd-engine inline bundle: core + edges + cards + state type
     AC-4: no fetch · AC-5: single file · AC-10: SVG overlay uses inset:0 NOT viewBox
     Particles: OFF by default (RD-2). Spotlight: not enabled for state diagrams.
     Node positions: x/y in pixels, pre-injected by bun elk step (RD-1 simulation). -->
<script>
(function(){
'use strict'

/* ── fd/core.js ── */

var NS = 'http://www.w3.org/2000/svg'
var nodeEl = {}
var canvas = null
var svgEl  = null
var DESCRIPTOR = null
var paths  = []
var pathByPair = new Map()

function initEngine(descriptor, canvasEl, svgOverlay){
  DESCRIPTOR = descriptor
  canvas = canvasEl
  svgEl  = svgOverlay
  nodeEl = {}
  paths  = []
  pathByPair = new Map()
  if(descriptor.canvas && descriptor.canvas.height){
    canvasEl.style.setProperty('--fd-canvas-h', descriptor.canvas.height + 'px')
  }
}

// canvas-relative rect for a node by id
function rect(id){
  var el = nodeEl[id]
  var cr = canvas.getBoundingClientRect()
  var b  = el.getBoundingClientRect()
  return { cx: b.left - cr.left + b.width / 2, cy: b.top - cr.top + b.height / 2, w: b.width, h: b.height }
}

// canonical unordered key for a node pair
function pairKey(a, b){ return [a, b].sort().join('|') }

// face selection: source exits toward target, target enters from opposite
function faceFor(dx, dy, isSource, edge){
  if(edge){
    if(isSource && edge.srcFace) return edge.srcFace
    if(!isSource && edge.dstFace) return edge.dstFace
  }
  if(Math.abs(dy) >= Math.abs(dx)){
    if(isSource) return dy > 0 ? 'bottom' : 'top'
    else         return dy > 0 ? 'top'    : 'bottom'
  } else {
    if(isSource) return dx > 0 ? 'right' : 'left'
    else         return dx > 0 ? 'left'  : 'right'
  }
}

// port slot spreader across node face
function portAnchor(r, face, slotIdx, slotCount){
  var cx = r.cx, cy = r.cy, w = r.w, h = r.h
  var hw = w / 2, hh = h / 2
  var faceLen = (face === 'top' || face === 'bottom') ? w : h
  var spread  = Math.min(faceLen * 0.55, slotCount * 16)
  var step    = slotCount > 1 ? spread / (slotCount - 1) : 0
  var offset  = slotCount > 1 ? -spread / 2 + slotIdx * step : 0
  switch(face){
    case 'top':    return { x: cx + offset, y: cy - hh, nx:  0, ny: -1 }
    case 'bottom': return { x: cx + offset, y: cy + hh, nx:  0, ny:  1 }
    case 'left':   return { x: cx - hw,     y: cy + offset, nx: -1, ny:  0 }
    case 'right':  return { x: cx + hw,     y: cy + offset, nx:  1, ny:  0 }
    default:       return { x: cx,          y: cy,           nx:  0, ny:  0 }
  }
}

// proportional bezier stub: clamp(dist * 0.35, 30, 220)
function stubLen(dx, dy){
  return Math.max(30, Math.min(220, Math.sqrt(dx * dx + dy * dy) * 0.35))
}

/* ── fd/types/state.js — node renderer ── */

// applyStateShape: augment the base .fd-node element with state-machine shape classes.
// kind='start'  → solid circle (fd-shape-circle fd-state-start)
// kind='end'    → double-ring circle (fd-shape-circle fd-state-end)
// kind='choice' → rotated diamond (fd-shape-diamond)
// default       → plain box (fd-state-box)
function applyStateShape(el, node){
  var kind = node.kind
  if(kind === 'start'){
    el.classList.add('fd-shape-circle', 'fd-state-start')
    el.innerHTML = ''
  } else if(kind === 'end'){
    el.classList.add('fd-shape-circle', 'fd-state-end')
    el.innerHTML = '<span class="fd-state-end-inner"></span>'
  } else if(kind === 'choice' || kind === 'fork'){
    el.classList.add('fd-shape-diamond')
    el.innerHTML = node.n ? '<span class="fd-state-diamond-label">' + node.n + '</span>' : ''
  } else {
    // default state box
    el.classList.add('fd-state-box')
    var sub = node.d ? '<div class="fd-sub">' + node.d + '</div>' : ''
    el.innerHTML = '<div class="fd-title">' + node.n + '</div>' + sub
  }
}

// renderNodes: position nodes using px coordinates (pre-injected by bun elk step).
// State diagram auto-layout branch: x/y are absolute pixel offsets from canvas top-left.
function renderNodes(nodes){
  for(var i = 0; i < nodes.length; i++){
    var node = nodes[i]
    var el = document.createElement('div')
    el.className = 'fd-node'
    el.dataset.id = node.id
    // Auto-layout: x/y in px space (bun elk step injected), convert to left/top
    el.style.left = node.x + 'px'
    el.style.top  = node.y + 'px'
    applyStateShape(el, node)
    canvas.appendChild(el)
    nodeEl[node.id] = el
  }
}

/* ── fd/edges.js ── */

// draw(): full edge pass — DOM-measured bezier paths
function draw(){
  svgEl.querySelectorAll(':scope > path, :scope > text, :scope > g').forEach(function(n){ n.remove() })
  paths = []
  pathByPair.clear()

  var EDGES = DESCRIPTOR.edges || []

  // Step 1: deduplicate
  var seenPairs = new Map()
  for(var i = 0; i < EDGES.length; i++){
    var e = EDGES[i]
    var k = pairKey(e.f, e.t)
    if(!seenPairs.has(k)){
      seenPairs.set(k, { f: e.f, t: e.t, plane: e.plane, lab: e.label || null, edge: e })
    } else {
      var entry = seenPairs.get(k)
      if(e.label && !entry.lab) entry.lab = e.label
    }
  }
  var dedupedEdges = Array.from(seenPairs.values())

  // Step 2: port maps
  var portMap = new Map()
  for(var j = 0; j < dedupedEdges.length; j++){
    var ref = dedupedEdges[j]
    var rf  = rect(ref.f)
    var rt  = rect(ref.t)
    var dx  = rt.cx - rf.cx
    var dy  = rt.cy - rf.cy
    var fFace = faceFor(dx, dy, true,  ref.edge)
    var tFace = faceFor(dx, dy, false, ref.edge)
    var fk = ref.f + ':' + fFace
    var tk = ref.t + ':' + tFace
    if(!portMap.has(fk)) portMap.set(fk, [])
    if(!portMap.has(tk)) portMap.set(tk, [])
    portMap.get(fk).push(j)
    portMap.get(tk).push(j)
  }

  // Step 3: one path per deduped pair
  for(var m = 0; m < dedupedEdges.length; m++){
    var dr   = dedupedEdges[m]
    var rfm  = rect(dr.f)
    var rtm  = rect(dr.t)
    var dxm  = rtm.cx - rfm.cx
    var dym  = rtm.cy - rfm.cy
    var fFm  = faceFor(dxm, dym, true,  dr.edge)
    var tFm  = faceFor(dxm, dym, false, dr.edge)
    var fkm  = dr.f + ':' + fFm
    var tkm  = dr.t + ':' + tFm
    var fSl  = portMap.get(fkm)
    var tSl  = portMap.get(tkm)
    var fi   = fSl.indexOf(m), ti = tSl.indexOf(m)
    var pu1  = portAnchor(rfm, fFm, fi, fSl.length)
    var pu2  = portAnchor(rtm, tFm, ti, tSl.length)
    var stb  = stubLen(dxm, dym)
    var c1x  = pu1.x + pu1.nx * stb
    var c1y  = pu1.y + pu1.ny * stb
    var c2x  = pu2.x + pu2.nx * stb
    var c2y  = pu2.y + pu2.ny * stb

    var dStr = 'M' + pu1.x.toFixed(1) + ',' + pu1.y.toFixed(1)
             + ' C' + c1x.toFixed(1) + ',' + c1y.toFixed(1)
             + ' ' + c2x.toFixed(1) + ',' + c2y.toFixed(1)
             + ' ' + pu2.x.toFixed(1) + ',' + pu2.y.toFixed(1)

    var p = document.createElementNS(NS, 'path')
    p.setAttribute('d', dStr)
    p.setAttribute('class', dr.plane)
    p.setAttribute('marker-end', 'url(#fd-arr-' + dr.plane + ')')
    p.dataset.f  = dr.f
    p.dataset.t  = dr.t
    p.dataset.pk = pairKey(dr.f, dr.t)
    svgEl.appendChild(p)
    paths.push(p)
    pathByPair.set(pairKey(dr.f, dr.t), p)

    // Edge label (de Casteljau midpoint)
    if(dr.lab){
      var tx = document.createElementNS(NS, 'text')
      var mx = 0.125 * pu1.x + 0.375 * c1x + 0.375 * c2x + 0.125 * pu2.x
      var my = 0.125 * pu1.y + 0.375 * c1y + 0.375 * c2y + 0.125 * pu2.y
      tx.setAttribute('x', mx.toFixed(1))
      tx.setAttribute('y', (my - 4).toFixed(1))
      tx.setAttribute('text-anchor', 'middle')
      // Guard labels (text starting with '[') get fd-guard-label class for amber coloring
      var isGuard = dr.lab.charAt(0) === '['
      tx.setAttribute('class', isGuard ? 'fd-guard-label' : 'fd-elabel hot')
      tx.dataset.pk = pairKey(dr.f, dr.t)
      tx.textContent = dr.lab
      svgEl.appendChild(tx)
    }
  }

  // Apply dashed style to internal/self-transition edges (edge.style='dashed')
  applyStateEdgeStyles()
}

// applyStateEdgeStyles: add fd-edge-dashed class to edges with style='dashed'
function applyStateEdgeStyles(){
  if(!DESCRIPTOR || !DESCRIPTOR.edges) return
  DESCRIPTOR.edges.forEach(function(edge){
    if(edge.style === 'dashed'){
      var pk = [edge.f, edge.t].sort().join('|')
      var pathEl = svgEl.querySelector('path[data-pk="' + pk + '"]')
      if(pathEl) pathEl.classList.add('fd-edge-dashed')
    }
  })
}

// redraw: re-runs full edge pass (called by ResizeObserver)
function redraw(){
  draw()
}

/* ── bootstrap ── */

function main(){
  var descriptor = JSON.parse(document.getElementById('fd-data').textContent)
  var canvasEl   = document.getElementById('fd-canvas')
  var svgOverlay = document.getElementById('fd-edges')

  initEngine(descriptor, canvasEl, svgOverlay)
  renderNodes(descriptor.nodes || [])
  draw()

  // ResizeObserver: edges re-measure on resize; node positions stay fixed (AC-3)
  new ResizeObserver(redraw).observe(canvasEl)
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', main)
} else {
  main()
}

}())
</script>
