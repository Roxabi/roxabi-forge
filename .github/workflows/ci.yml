name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: bun install
      - name: Lint
        run: bun lint
      - name: Syntax-check Python scripts
        run: python3 -m py_compile scripts/*.py
      - name: Unit tests
        run: bun run test
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
      - name: Install Playwright (fd-engine render gate)
        run: |
          uv run --with playwright python3 -m playwright install --with-deps chromium
      - name: fd script contract tests
        run: |
          bash scripts/validate-descriptor.test.sh
          bash scripts/forge_paths.test.sh
      - name: fd-engine regression (gen-fd + validate)
        timeout-minutes: 5
        env:
          FORGE_REF: ""
        run: timeout 180 bun run gen-fd:check
      - name: Mermaid guard
        run: |
          matches=$(grep -rn '\bmermaid\b' plugins/forge/ 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "::error::Mermaid references detected — blocked by #21. Use fgraph templates from plugins/forge/references/graph-templates/ instead."
            echo "$matches"
            exit 1
          fi
      - name: Validate fgraph SVG
        # Auto-discovers all graph-template HTML (mirrors the lefthook **/*.html glob)
        # so new subdirs can't slip past CI; fgraph-base.css passed explicitly (not *.html).
        run: |
          find plugins/forge/references/graph-templates -name '*.html' -print0 \
            | xargs -0 bash plugins/forge/scripts/validate-svg.sh plugins/forge/references/graph-templates/fgraph-base.css
      - name: OG exclude rules (self-test)
        run: python3 scripts/gen-og-images.py --self-test
      - name: Reference showcase runtime gate
        run: python3 scripts/validate-reference-runtime.py
