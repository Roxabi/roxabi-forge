pre-commit:
  commands:
    lint:
      run: bunx biome check --write {staged_files}
      glob: "*.{js,jsx}"  # must track biome.json files.includes
    manifest:
      run: scripts/gen-plugin-manifest.py --check
      glob:
        - "plugins/forge/skills/*/SKILL.md"
        - ".claude-plugin/plugin.json"
        - ".claude-plugin/marketplace.json"
    trufflehog:
      run: scripts/trufflehog-check.sh
      skip:
        - merge
        - rebase
    mermaid-deprecation-warn:
      # Non-blocking. Warns when staged files contain mermaid references.
      # Scheduled for flip to blocking `mermaid-guard` in #24.
      #
      # Case-sensitivity: intentionally matches lowercase `mermaid` only.
      # The P2.7/P2.8 stderr prose in scripts/render-md*.py uses capitalized
      # `Mermaid` so the blocking #24 variant of this check can keep the
      # same case-sensitive pattern without tripping on legitimate error
      # messages. #24 should inherit this choice, not flip to -i.
      #
      # File-path safety: pipe {staged_files} through xargs -0 so paths
      # with spaces / shell metacharacters don't split or inject. Lefthook
      # substitutes {staged_files} as a newline-separated list when used
      # inside a here-string redirection.
      run: |
        matches=$(printf '%s\n' {staged_files} | xargs -d '\n' -I {} grep -Hn '\bmermaid\b' {} 2>/dev/null || true)
        if [ -n "$matches" ]; then
          echo ""
          echo "  warn: mermaid references detected in staged files (#21 — scheduled for deletion in Cycle 2)"
          echo "$matches" | sed 's/^/    /'
          echo ""
        fi
        exit 0
      glob:
        - "plugins/forge/**/*"
        - "scripts/*.py"

commit-msg:
  commands:
    conventional-commits:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    trufflehog:
      run: scripts/trufflehog-check.sh
